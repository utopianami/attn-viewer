openapi: 3.1.0
info:
  title: attn-viewer API
  version: 0.1.0
servers:
  - url: http://127.0.0.1:3000
paths:
  /api/session:
    get:
      summary: Get current login session
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /api/login:
    post:
      summary: Login with a configured account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username:
                  type: string
                password:
                  type: string
      responses:
        "200":
          description: Login succeeded
          headers:
            Set-Cookie:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Accounts are not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/logout:
    post:
      summary: Clear current login session
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
  /api/documents:
    get:
      summary: List current user's uploaded documents
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Document list
          content:
            application/json:
              schema:
                type: object
                required: [ok, documents]
                properties:
                  ok:
                    type: boolean
                  documents:
                    type: array
                    items:
                      $ref: "#/components/schemas/DocumentListItem"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /api/documents/latest:
    get:
      summary: Get latest current-user document
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Latest document or null
          content:
            application/json:
              schema:
                type: object
                required: [ok, document]
                properties:
                  ok:
                    type: boolean
                  document:
                    oneOf:
                      - $ref: "#/components/schemas/Document"
                      - type: "null"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /api/documents/{id}:
    get:
      summary: Get a current-user document by id
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/DocumentId"
      responses:
        "200":
          description: Document payload
          content:
            application/json:
              schema:
                type: object
                required: [ok, document]
                properties:
                  ok:
                    type: boolean
                  document:
                    $ref: "#/components/schemas/Document"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Document not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      summary: Update current-user document metadata
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/DocumentId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DocumentUpdateRequest"
      responses:
        "200":
          description: Updated document payload
          content:
            application/json:
              schema:
                type: object
                required: [ok, document]
                properties:
                  ok:
                    type: boolean
                  document:
                    $ref: "#/components/schemas/Document"
        "400":
          description: Invalid document metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Document not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      summary: Delete a current-user document and generated files
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/DocumentId"
      responses:
        "200":
          description: Document deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Document not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/documents/{id}/pdf:
    get:
      summary: Get original PDF for a current-user document
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/DocumentId"
      responses:
        "200":
          description: PDF bytes
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: PDF not found
  /api/documents/{id}/shares:
    post:
      summary: Create or reuse a public read-only share link for a current-user document
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/DocumentId"
      responses:
        "200":
          description: Share link
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShareResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Document not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/documents/{id}/analyze:
    post:
      summary: Start a background Korean translation analysis job
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/DocumentId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                pages:
                  type: integer
                  minimum: 0
      responses:
        "202":
          description: Analysis job accepted
          content:
            application/json:
              schema:
                type: object
                required: [ok, job]
                properties:
                  ok:
                    type: boolean
                  job:
                    $ref: "#/components/schemas/AnalysisJob"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Document not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Document already has a translation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/documents/{id}/notes:
    get:
      summary: List current-user LLM notes for a document
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/DocumentId"
      responses:
        "200":
          description: Document notes
          content:
            application/json:
              schema:
                type: object
                required: [ok, notes]
                properties:
                  ok:
                    type: boolean
                  notes:
                    type: array
                    items:
                      $ref: "#/components/schemas/DocumentNote"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Document not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/documents/{id}/notes/ask:
    post:
      summary: Ask an LLM about selected text using the full English document and create a private note
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/DocumentId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DocumentNoteAskRequest"
      responses:
        "202":
          description: Private note created and LLM answer queued
          content:
            application/json:
              schema:
                type: object
                required: [ok, note]
                properties:
                  ok:
                    type: boolean
                  note:
                    $ref: "#/components/schemas/DocumentNote"
        "400":
          description: Invalid note request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Document not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/documents/{id}/notes/{noteId}:
    get:
      summary: Get a current-user document note
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/DocumentId"
        - $ref: "#/components/parameters/NoteId"
      responses:
        "200":
          description: Document note
          content:
            application/json:
              schema:
                type: object
                required: [ok, note]
                properties:
                  ok:
                    type: boolean
                  note:
                    $ref: "#/components/schemas/DocumentNote"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Document or note not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      summary: Delete a current-user document note
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/DocumentId"
        - $ref: "#/components/parameters/NoteId"
      responses:
        "200":
          description: Note deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Document or note not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/documents/{id}/notes/{noteId}/messages:
    post:
      summary: Add a follow-up question to a current-user document note
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/DocumentId"
        - $ref: "#/components/parameters/NoteId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DocumentNoteMessageRequest"
      responses:
        "202":
          description: Follow-up question accepted and answer queued
          content:
            application/json:
              schema:
                type: object
                required: [ok, note]
                properties:
                  ok:
                    type: boolean
                  note:
                    $ref: "#/components/schemas/DocumentNote"
        "400":
          description: Invalid message request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Note not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Note already has a pending answer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/analysis-jobs/{jobId}:
    get:
      summary: Get background translation analysis job status
      security:
        - cookieAuth: []
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
            pattern: "^[a-zA-Z0-9-]+$"
      responses:
        "200":
          description: Analysis job status
          content:
            application/json:
              schema:
                type: object
                required: [ok, job]
                properties:
                  ok:
                    type: boolean
                  job:
                    $ref: "#/components/schemas/AnalysisJob"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Job not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/uploads/pdf:
    post:
      summary: Upload and convert a PDF for the current user
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [pdf]
              properties:
                pdf:
                  type: string
                  format: binary
      responses:
        "200":
          description: Upload converted
          content:
            application/json:
              schema:
                type: object
                required: [ok, document]
                properties:
                  ok:
                    type: boolean
                  document:
                    $ref: "#/components/schemas/Document"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "413":
          description: Upload too large
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/analysis-html:
    get:
      summary: List current user HTML analysis files
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Analysis HTML file list
          content:
            application/json:
              schema:
                type: object
                required: [ok, files]
                properties:
                  ok:
                    type: boolean
                  files:
                    type: array
                    items:
                      $ref: "#/components/schemas/AnalysisHtmlFile"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /api/analysis-html/{file}:
    get:
      summary: Get a current-user HTML analysis file
      security:
        - cookieAuth: []
      parameters:
        - name: file
          in: path
          required: true
          schema:
            type: string
            pattern: "^[^/\\]+\\.html?$"
      responses:
        "200":
          description: HTML analysis file
          content:
            text/html:
              schema:
                type: string
        "400":
          description: Bad file name
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: File not found
    delete:
      summary: Delete a current-user HTML analysis file
      security:
        - cookieAuth: []
      parameters:
        - name: file
          in: path
          required: true
          schema:
            type: string
            pattern: "^[^/\\]+\\.html?$"
      responses:
        "200":
          description: Analysis HTML file deleted
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok:
                    type: boolean
        "400":
          description: Bad file name
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: File not found
  /api/analysis-html/{file}/shares:
    post:
      summary: Create or reuse a public share link for a current-user HTML analysis file
      security:
        - cookieAuth: []
      parameters:
        - name: file
          in: path
          required: true
          schema:
            type: string
            pattern: "^[^/\\]+\\.html?$"
      responses:
        "200":
          description: Analysis HTML share payload
          content:
            application/json:
              schema:
                type: object
                required: [ok, share]
                properties:
                  ok:
                    type: boolean
                  share:
                    $ref: "#/components/schemas/AnalysisHtmlShare"
        "400":
          description: Bad file name
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: File not found
  /api/analysis-html/{file}/chats:
    get:
      summary: List current-user LLM chat threads for an HTML analysis file
      security:
        - cookieAuth: []
      parameters:
        - name: file
          in: path
          required: true
          schema:
            type: string
            pattern: "^[^/\\]+\\.html?$"
      responses:
        "200":
          description: Analysis HTML chat payload
          content:
            application/json:
              schema:
                type: object
                required: [ok, chat]
                properties:
                  ok:
                    type: boolean
                  chat:
                    $ref: "#/components/schemas/AnalysisHtmlChat"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: File not found
    post:
      summary: Create an LLM chat thread for an HTML analysis file
      security:
        - cookieAuth: []
      parameters:
        - name: file
          in: path
          required: true
          schema:
            type: string
            pattern: "^[^/\\]+\\.html?$"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                title:
                  type: string
                  maxLength: 80
      responses:
        "200":
          description: Created chat thread
          content:
            application/json:
              schema:
                type: object
                required: [ok, thread]
                properties:
                  ok:
                    type: boolean
                  thread:
                    $ref: "#/components/schemas/AnalysisHtmlChatThread"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: File not found
  /api/analysis-html/{file}/chats/{threadId}/messages:
    post:
      summary: Append a question to an HTML analysis LLM chat thread
      security:
        - cookieAuth: []
      parameters:
        - name: file
          in: path
          required: true
          schema:
            type: string
            pattern: "^[^/\\]+\\.html?$"
        - name: threadId
          in: path
          required: true
          schema:
            type: string
            pattern: "^[a-zA-Z0-9-]+$"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [question]
              properties:
                question:
                  type: string
                  minLength: 1
                  maxLength: 4000
                modelMode:
                  type: string
                  enum: [fast, deep]
      responses:
        "202":
          description: Question accepted and answer generation started
          content:
            application/json:
              schema:
                type: object
                required: [ok, thread]
                properties:
                  ok:
                    type: boolean
                  thread:
                    $ref: "#/components/schemas/AnalysisHtmlChatThread"
        "400":
          description: Invalid message
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: File or thread not found
        "409":
          description: Previous answer is still running
  /api/analysis-html/{file}/chats/{threadId}:
    delete:
      summary: Delete an HTML analysis LLM chat thread
      security:
        - cookieAuth: []
      parameters:
        - name: file
          in: path
          required: true
          schema:
            type: string
            pattern: "^[^/\\]+\\.html?$"
        - name: threadId
          in: path
          required: true
          schema:
            type: string
            pattern: "^[a-zA-Z0-9-]+$"
      responses:
        "200":
          description: Chat thread deleted
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok:
                    type: boolean
        "400":
          description: Invalid chat path
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Thread not found
        "409":
          description: Thread is still running
  /api/chats:
    get:
      summary: List current-user saved chats
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Chat history list
          content:
            application/json:
              schema:
                type: object
                required: [ok, chats]
                properties:
                  ok:
                    type: boolean
                  chats:
                    type: array
                    items:
                      $ref: "#/components/schemas/ChatSummary"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      summary: Create a current-user chat
      security:
        - cookieAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatCreateRequest"
      responses:
        "200":
          description: Created chat
          content:
            application/json:
              schema:
                type: object
                required: [ok, chat]
                properties:
                  ok:
                    type: boolean
                  chat:
                    $ref: "#/components/schemas/Chat"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /api/chats/{chatId}:
    get:
      summary: Get a current-user saved chat
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/ChatId"
      responses:
        "200":
          description: Chat payload
          content:
            application/json:
              schema:
                type: object
                required: [ok, chat]
                properties:
                  ok:
                    type: boolean
                  chat:
                    $ref: "#/components/schemas/Chat"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Chat not found
    delete:
      summary: Delete a current-user saved chat
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/ChatId"
      responses:
        "200":
          description: Chat deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Chat not found
        "409":
          description: Chat is still running
  /api/chats/{chatId}/messages:
    post:
      summary: Append a question to a current-user chat and queue an LLM answer
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/ChatId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatMessageRequest"
      responses:
        "202":
          description: Question accepted and answer generation started
          content:
            application/json:
              schema:
                type: object
                required: [ok, chat]
                properties:
                  ok:
                    type: boolean
                  chat:
                    $ref: "#/components/schemas/Chat"
        "400":
          description: Invalid message
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Chat not found
        "409":
          description: Previous answer is still running
  /api/chats/{chatId}/messages/{messageId}/ask:
    post:
      summary: Ask a fast/deep follow-up about one saved chat message
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/ChatId"
        - $ref: "#/components/parameters/MessageId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatMessageAskRequest"
      responses:
        "202":
          description: Follow-up accepted and answer generation started
          content:
            application/json:
              schema:
                type: object
                required: [ok, chat]
                properties:
                  ok:
                    type: boolean
                  chat:
                    $ref: "#/components/schemas/Chat"
        "400":
          description: Invalid question
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Chat or message not found
        "409":
          description: Previous answer is still running
  /api/chats/{chatId}/message-notes/{noteId}/messages:
    post:
      summary: Append a follow-up question to one saved chat message note
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/ChatId"
        - $ref: "#/components/parameters/NoteId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatMessageAskRequest"
      responses:
        "202":
          description: Follow-up accepted and answer generation started
          content:
            application/json:
              schema:
                type: object
                required: [ok, chat]
                properties:
                  ok:
                    type: boolean
                  chat:
                    $ref: "#/components/schemas/Chat"
        "400":
          description: Invalid question
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Chat or message note not found
        "409":
          description: Previous note answer is still running
  /api/chats/{chatId}/message-notes/{noteId}:
    delete:
      summary: Delete one saved chat message note
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/ChatId"
        - $ref: "#/components/parameters/NoteId"
      responses:
        "200":
          description: Message note deleted
          content:
            application/json:
              schema:
                type: object
                required: [ok, chat]
                properties:
                  ok:
                    type: boolean
                  chat:
                    $ref: "#/components/schemas/Chat"
        "400":
          description: Invalid note path
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Chat or message note not found
  /api/analysis-html-shares/{token}:
    get:
      summary: Get public shared HTML analysis file
      parameters:
        - $ref: "#/components/parameters/ShareToken"
      responses:
        "200":
          description: Shared HTML analysis file
          content:
            text/html:
              schema:
                type: string
        "400":
          description: Bad share token
        "404":
          description: Share not found
  /api/shares/{token}:
    get:
      summary: Get a public shared document by token
      parameters:
        - $ref: "#/components/parameters/ShareToken"
      responses:
        "200":
          description: Shared document payload
          content:
            application/json:
              schema:
                type: object
                required: [ok, document]
                properties:
                  ok:
                    type: boolean
                  document:
                    $ref: "#/components/schemas/Document"
        "404":
          description: Share not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/shares/{token}/pdf:
    get:
      summary: Get original PDF for a public shared document
      parameters:
        - $ref: "#/components/parameters/ShareToken"
      responses:
        "200":
          description: PDF bytes
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        "404":
          description: Share or PDF not found
  /api/shares/{token}/assets/{file}:
    get:
      summary: Get extracted asset for a public shared document
      parameters:
        - $ref: "#/components/parameters/ShareToken"
        - name: file
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Asset bytes
        "404":
          description: Share or asset not found
  /assets/{id}/{file}:
    get:
      summary: Get extracted asset for a current-user document
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/DocumentId"
        - name: file
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Asset bytes
        "401":
          $ref: "#/components/responses/Unauthorized"
components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: attn_session
  parameters:
    DocumentId:
      name: id
      in: path
      required: true
      schema:
        type: string
        pattern: "^[a-zA-Z0-9-]+$"
    ShareToken:
      name: token
      in: path
      required: true
      schema:
        type: string
        pattern: "^[a-zA-Z0-9-]+$"
    NoteId:
      name: noteId
      in: path
      required: true
      schema:
        type: string
        pattern: "^[a-zA-Z0-9-]+$"
    ChatId:
      name: chatId
      in: path
      required: true
      schema:
        type: string
        pattern: "^[a-zA-Z0-9-]+$"
    MessageId:
      name: messageId
      in: path
      required: true
      schema:
        type: string
        pattern: "^[a-zA-Z0-9-]+$"
  responses:
    Unauthorized:
      description: Login required
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    OkResponse:
      type: object
      required: [ok]
      properties:
        ok:
          type: boolean
    ErrorResponse:
      type: object
      required: [ok, error]
      properties:
        ok:
          type: boolean
        error:
          type: string
    SessionResponse:
      type: object
      required: [ok, user]
      properties:
        ok:
          type: boolean
        user:
          type: object
          required: [username]
          properties:
            username:
              type: string
    ShareResponse:
      type: object
      required: [ok, share]
      properties:
        ok:
          type: boolean
        share:
          $ref: "#/components/schemas/Share"
    Share:
      type: object
      required: [id, token, documentId, createdAt, sharePath]
      properties:
        id:
          type: string
        token:
          type: string
        documentId:
          type: string
        createdAt:
          type: string
        sharePath:
          type: string
    AnalysisHtmlFile:
      type: object
      required: [file, title, summary, size, updatedAt, url]
      properties:
        file:
          type: string
        title:
          type: string
        summary:
          type: string
        size:
          type: integer
        updatedAt:
          type: string
        url:
          type: string
    AnalysisHtmlShare:
      type: object
      required: [id, token, analysisFile, createdAt, sharePath]
      properties:
        id:
          type: string
        token:
          type: string
        analysisFile:
          type: string
        createdAt:
          type: string
        sharePath:
          type: string
    AnalysisHtmlChat:
      type: object
      required: [file, threads]
      properties:
        file:
          type: string
        threads:
          type: array
          items:
            $ref: "#/components/schemas/AnalysisHtmlChatThread"
    AnalysisHtmlChatThread:
      type: object
      required: [id, file, title, status, messages, error, createdAt, updatedAt]
      properties:
        id:
          type: string
        file:
          type: string
        title:
          type: string
        status:
          type: string
          enum: [idle, pending, running, completed, failed]
        messages:
          type: array
          items:
            $ref: "#/components/schemas/AnalysisHtmlChatMessage"
        error:
          type: string
        createdAt:
          type: string
        updatedAt:
          type: string
    AnalysisHtmlChatMessage:
      type: object
      required: [id, role, content, model, modelMode, status, error, createdAt]
      properties:
        id:
          type: string
        role:
          type: string
          enum: [user, assistant]
        content:
          type: string
        model:
          type: string
        modelMode:
          type: string
          enum: [fast, deep]
        status:
          type: string
          enum: [pending, completed, failed]
        error:
          type: string
        createdAt:
          type: string
    ChatCreateRequest:
      type: object
      additionalProperties: false
      properties:
        title:
          type: string
          maxLength: 80
    ChatMessageRequest:
      type: object
      additionalProperties: false
      required: [question, providers, thinkLevel]
      properties:
        question:
          type: string
          minLength: 1
          maxLength: 4000
        providers:
          type: array
          minItems: 1
          uniqueItems: true
          items:
            type: string
            enum: [anthropic, openai, grok]
        thinkLevel:
          type: integer
          minimum: 1
          maximum: 3
    ChatMessageAskRequest:
      type: object
      additionalProperties: false
      required: [question, modelMode]
      properties:
        question:
          type: string
          minLength: 1
          maxLength: 4000
        modelMode:
          type: string
          enum: [fast, deep]
          default: fast
    ChatSummary:
      type: object
      required: [id, title, status, messageCount, providers, thinkLevel, createdAt, updatedAt]
      properties:
        id:
          type: string
        title:
          type: string
        status:
          type: string
          enum: [idle, pending, running, completed, failed]
        messageCount:
          type: integer
          minimum: 0
        providers:
          type: array
          items:
            type: string
            enum: [anthropic, openai, grok]
        thinkLevel:
          type: integer
          minimum: 1
          maximum: 3
        createdAt:
          type: string
        updatedAt:
          type: string
    Chat:
      type: object
      required: [id, title, status, messages, messageNotes, providers, thinkLevel, artifacts, error, createdAt, updatedAt]
      properties:
        id:
          type: string
        title:
          type: string
        status:
          type: string
          enum: [idle, pending, running, completed, failed]
        messages:
          type: array
          items:
            $ref: "#/components/schemas/ChatMessage"
        messageNotes:
          type: array
          items:
            $ref: "#/components/schemas/ChatMessageNote"
        providers:
          type: array
          items:
            type: string
            enum: [anthropic, openai, grok]
        thinkLevel:
          type: integer
          minimum: 1
          maximum: 3
        artifacts:
          $ref: "#/components/schemas/ChatArtifacts"
        error:
          type: string
        createdAt:
          type: string
        updatedAt:
          type: string
    ChatMessage:
      type: object
      required: [id, role, content, providers, thinkLevel, artifacts, status, error, createdAt]
      properties:
        id:
          type: string
        role:
          type: string
          enum: [user, assistant]
        content:
          type: string
        providers:
          type: array
          items:
            type: string
            enum: [anthropic, openai, grok]
        thinkLevel:
          type: integer
          minimum: 1
          maximum: 3
        artifacts:
          $ref: "#/components/schemas/ChatArtifacts"
        parentMessageId:
          type: string
        modelMode:
          type: string
          enum: [fast, deep]
        status:
          type: string
          enum: [pending, completed, failed]
        error:
          type: string
        createdAt:
          type: string
    ChatMessageNote:
      type: object
      required: [id, parentMessageId, question, answer, status, model, modelMode, messages, error, artifacts, createdAt, updatedAt]
      properties:
        id:
          type: string
        parentMessageId:
          type: string
        question:
          type: string
        answer:
          type: string
        status:
          type: string
          enum: [pending, running, completed, failed]
        model:
          type: string
        modelMode:
          type: string
          enum: [fast, deep]
        messages:
          type: array
          items:
            $ref: "#/components/schemas/ChatMessageNoteMessage"
        error:
          type: string
        artifacts:
          $ref: "#/components/schemas/ChatArtifacts"
        createdAt:
          type: string
        updatedAt:
          type: string
    ChatMessageNoteMessage:
      type: object
      required: [id, role, content, model, modelMode, status, error, createdAt]
      properties:
        id:
          type: string
        role:
          type: string
          enum: [user, assistant]
        content:
          type: string
        model:
          type: string
        modelMode:
          type: string
          enum: [fast, deep]
        status:
          type: string
          enum: [pending, completed, failed]
        error:
          type: string
        createdAt:
          type: string
    ChatArtifacts:
      type: object
      required: [layers]
      properties:
        layers:
          type: array
          items:
            $ref: "#/components/schemas/ChatArtifactLayer"
    ChatArtifactLayer:
      type: object
      required: [name, data, createdAt]
      properties:
        name:
          type: string
        data:
          type: object
          additionalProperties: true
        createdAt:
          type: string
    DocumentListItem:
      type: object
      required:
        - id
        - originalName
        - size
        - uploadedAt
        - convertedAt
        - hasAnalysis
        - analysisStatus
        - analysisProgress
        - activeAnalysisJobId
        - summary
      properties:
        id:
          type: string
        originalName:
          type: string
        size:
          type: integer
        uploadedAt:
          type: string
        convertedAt:
          type: string
        hasAnalysis:
          type: boolean
        analysisStatus:
          type: string
          enum: [idle, queued, running, succeeded, failed]
        analysisProgress:
          oneOf:
            - $ref: "#/components/schemas/AnalysisProgress"
            - type: "null"
        activeAnalysisJobId:
          type: string
        summary:
          type: string
    Document:
      type: object
      required:
        - id
        - originalName
        - size
        - uploadedAt
        - convertedAt
        - markdown
        - markdownBytes
        - pdfUrl
        - assets
        - analysis
        - analysisStatus
        - analysisProgress
        - activeAnalysisJobId
        - warnings
      properties:
        id:
          type: string
        originalName:
          type: string
        size:
          type: integer
        uploadedAt:
          type: string
        convertedAt:
          type: string
        markdown:
          type: string
        markdownBytes:
          type: integer
        pdfUrl:
          type: string
        assets:
          $ref: "#/components/schemas/AssetManifest"
        analysis:
          oneOf:
            - $ref: "#/components/schemas/Analysis"
            - type: "null"
        analysisStatus:
          type: string
          enum: [idle, queued, running, succeeded, failed]
        analysisProgress:
          oneOf:
            - $ref: "#/components/schemas/AnalysisProgress"
            - type: "null"
        activeAnalysisJobId:
          type: string
        warnings:
          type: string
    DocumentUpdateRequest:
      type: object
      additionalProperties: false
      required: [originalName]
      properties:
        originalName:
          type: string
          minLength: 1
          maxLength: 180
    DocumentNoteAskRequest:
      type: object
      required: [page, anchorText, question]
      properties:
        page:
          type: integer
          minimum: 1
        anchorText:
          type: string
          minLength: 1
          maxLength: 1200
        question:
          type: string
          minLength: 1
          maxLength: 2000
        modelMode:
          type: string
          enum: [fast, deep]
          default: fast
        paragraph:
          type: string
          maxLength: 6000
        contextBefore:
          type: string
          maxLength: 6000
        contextAfter:
          type: string
          maxLength: 6000
    DocumentNoteMessageRequest:
      type: object
      required: [question]
      properties:
        question:
          type: string
          minLength: 1
          maxLength: 2000
        modelMode:
          type: string
          enum: [fast, deep]
          default: fast
    DocumentNoteMessage:
      type: object
      required: [id, role, content, createdAt]
      properties:
        id:
          type: string
        role:
          type: string
          enum: [user, assistant]
        content:
          type: string
        model:
          type: string
        modelMode:
          type: string
          enum: [fast, deep]
        status:
          type: string
          enum: [pending, completed, failed]
        error:
          type: string
        createdAt:
          type: string
    DocumentNote:
      type: object
      required:
        - id
        - documentId
        - page
        - anchorText
        - question
        - answer
        - status
        - context
        - messages
        - provider
        - model
        - modelMode
        - error
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
        documentId:
          type: string
        page:
          type: integer
          minimum: 1
        anchorText:
          type: string
        question:
          type: string
        answer:
          type: string
        status:
          type: string
          enum: [pending, running, completed, failed]
        context:
          type: object
          required: [sourceLanguage, paragraph, before, after]
          properties:
            sourceLanguage:
              type: string
              enum: [en]
            paragraph:
              type: string
            before:
              type: string
            after:
              type: string
        messages:
          type: array
          items:
            $ref: "#/components/schemas/DocumentNoteMessage"
        provider:
          type: string
        model:
          type: string
        modelMode:
          type: string
          enum: [fast, deep]
        error:
          type: string
        createdAt:
          type: string
        updatedAt:
          type: string
    AssetManifest:
      type: object
      properties:
        pageCount:
          type:
            - integer
            - "null"
        charts:
          type: array
          items:
            $ref: "#/components/schemas/Asset"
        pages:
          type: array
          items:
            $ref: "#/components/schemas/Asset"
        error:
          type: string
    Asset:
      type: object
      properties:
        kind:
          type: string
        page:
          type: integer
        file:
          type: string
        label:
          type: string
        url:
          type: string
    Analysis:
      type: object
      properties:
        id:
          type: string
        analysisVersion:
          type: integer
        generatedAt:
          type: string
        provider:
          type: string
        model:
          type: string
        pageLimit:
          type: integer
        isSample:
          type: boolean
        overall:
          type: object
          properties:
            summary:
              type: string
            bullets:
              type: array
              items:
                type: string
        pages:
          type: array
          items:
            type: object
    AnalysisJob:
      type: object
      required:
        - id
        - documentId
        - pageLimit
        - status
        - progress
        - createdAt
        - updatedAt
        - error
        - analysis
      properties:
        id:
          type: string
        documentId:
          type: string
        pageLimit:
          type: integer
        status:
          type: string
          enum: [queued, running, succeeded, failed]
        progress:
          $ref: "#/components/schemas/AnalysisProgress"
        createdAt:
          type: string
        updatedAt:
          type: string
        error:
          type: string
        analysis:
          oneOf:
            - $ref: "#/components/schemas/Analysis"
            - type: "null"
    AnalysisProgress:
      type: object
      required: [completed, total, percent, message]
      properties:
        completed:
          type: integer
        total:
          type: integer
        percent:
          type: integer
        message:
          type: string
