openapi: 3.1.0
info:
  title: attn-viewer API
  version: 0.1.0
servers:
  - url: http://127.0.0.1:3000
paths:
  /api/session:
    get:
      summary: Get current login session
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /api/login:
    post:
      summary: Login with a configured account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username:
                  type: string
                password:
                  type: string
      responses:
        "200":
          description: Login succeeded
          headers:
            Set-Cookie:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Accounts are not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/logout:
    post:
      summary: Clear current login session
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
  /api/documents:
    get:
      summary: List current user's uploaded documents
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Document list
          content:
            application/json:
              schema:
                type: object
                required: [ok, documents]
                properties:
                  ok:
                    type: boolean
                  documents:
                    type: array
                    items:
                      $ref: "#/components/schemas/DocumentListItem"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /api/documents/latest:
    get:
      summary: Get latest current-user document
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Latest document or null
          content:
            application/json:
              schema:
                type: object
                required: [ok, document]
                properties:
                  ok:
                    type: boolean
                  document:
                    oneOf:
                      - $ref: "#/components/schemas/Document"
                      - type: "null"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /api/documents/{id}:
    get:
      summary: Get a current-user document by id
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/DocumentId"
      responses:
        "200":
          description: Document payload
          content:
            application/json:
              schema:
                type: object
                required: [ok, document]
                properties:
                  ok:
                    type: boolean
                  document:
                    $ref: "#/components/schemas/Document"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Document not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      summary: Delete a current-user document and generated files
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/DocumentId"
      responses:
        "200":
          description: Document deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Document not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/documents/{id}/pdf:
    get:
      summary: Get original PDF for a current-user document
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/DocumentId"
      responses:
        "200":
          description: PDF bytes
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: PDF not found
  /api/documents/{id}/shares:
    post:
      summary: Create or reuse a public read-only share link for a current-user document
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/DocumentId"
      responses:
        "200":
          description: Share link
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShareResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Document not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/documents/{id}/analyze:
    post:
      summary: Start a background Korean translation analysis job
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/DocumentId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                pages:
                  type: integer
                  minimum: 0
      responses:
        "202":
          description: Analysis job accepted
          content:
            application/json:
              schema:
                type: object
                required: [ok, job]
                properties:
                  ok:
                    type: boolean
                  job:
                    $ref: "#/components/schemas/AnalysisJob"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Document not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Document already has a translation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/documents/{id}/notes:
    get:
      summary: List current-user LLM notes for a document
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/DocumentId"
      responses:
        "200":
          description: Document notes
          content:
            application/json:
              schema:
                type: object
                required: [ok, notes]
                properties:
                  ok:
                    type: boolean
                  notes:
                    type: array
                    items:
                      $ref: "#/components/schemas/DocumentNote"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Document not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/documents/{id}/notes/ask:
    post:
      summary: Ask an LLM about selected text using the full English document and create a private note
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/DocumentId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DocumentNoteAskRequest"
      responses:
        "202":
          description: Private note created and LLM answer queued
          content:
            application/json:
              schema:
                type: object
                required: [ok, note]
                properties:
                  ok:
                    type: boolean
                  note:
                    $ref: "#/components/schemas/DocumentNote"
        "400":
          description: Invalid note request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Document not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/documents/{id}/notes/{noteId}:
    get:
      summary: Get a current-user document note
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/DocumentId"
        - $ref: "#/components/parameters/NoteId"
      responses:
        "200":
          description: Document note
          content:
            application/json:
              schema:
                type: object
                required: [ok, note]
                properties:
                  ok:
                    type: boolean
                  note:
                    $ref: "#/components/schemas/DocumentNote"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Document or note not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      summary: Delete a current-user document note
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/DocumentId"
        - $ref: "#/components/parameters/NoteId"
      responses:
        "200":
          description: Note deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Document or note not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/documents/{id}/notes/{noteId}/messages:
    post:
      summary: Add a follow-up question to a current-user document note
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/DocumentId"
        - $ref: "#/components/parameters/NoteId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DocumentNoteMessageRequest"
      responses:
        "202":
          description: Follow-up question accepted and answer queued
          content:
            application/json:
              schema:
                type: object
                required: [ok, note]
                properties:
                  ok:
                    type: boolean
                  note:
                    $ref: "#/components/schemas/DocumentNote"
        "400":
          description: Invalid message request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Note not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Note already has a pending answer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/analysis-jobs/{jobId}:
    get:
      summary: Get background translation analysis job status
      security:
        - cookieAuth: []
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
            pattern: "^[a-zA-Z0-9-]+$"
      responses:
        "200":
          description: Analysis job status
          content:
            application/json:
              schema:
                type: object
                required: [ok, job]
                properties:
                  ok:
                    type: boolean
                  job:
                    $ref: "#/components/schemas/AnalysisJob"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Job not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/uploads/pdf:
    post:
      summary: Upload and convert a PDF for the current user
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [pdf]
              properties:
                pdf:
                  type: string
                  format: binary
      responses:
        "200":
          description: Upload converted
          content:
            application/json:
              schema:
                type: object
                required: [ok, document]
                properties:
                  ok:
                    type: boolean
                  document:
                    $ref: "#/components/schemas/Document"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "413":
          description: Upload too large
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/shares/{token}:
    get:
      summary: Get a public shared document by token
      parameters:
        - $ref: "#/components/parameters/ShareToken"
      responses:
        "200":
          description: Shared document payload
          content:
            application/json:
              schema:
                type: object
                required: [ok, document]
                properties:
                  ok:
                    type: boolean
                  document:
                    $ref: "#/components/schemas/Document"
        "404":
          description: Share not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/shares/{token}/pdf:
    get:
      summary: Get original PDF for a public shared document
      parameters:
        - $ref: "#/components/parameters/ShareToken"
      responses:
        "200":
          description: PDF bytes
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        "404":
          description: Share or PDF not found
  /api/shares/{token}/assets/{file}:
    get:
      summary: Get extracted asset for a public shared document
      parameters:
        - $ref: "#/components/parameters/ShareToken"
        - name: file
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Asset bytes
        "404":
          description: Share or asset not found
  /assets/{id}/{file}:
    get:
      summary: Get extracted asset for a current-user document
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/DocumentId"
        - name: file
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Asset bytes
        "401":
          $ref: "#/components/responses/Unauthorized"
components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: attn_session
  parameters:
    DocumentId:
      name: id
      in: path
      required: true
      schema:
        type: string
        pattern: "^[a-zA-Z0-9-]+$"
    ShareToken:
      name: token
      in: path
      required: true
      schema:
        type: string
        pattern: "^[a-zA-Z0-9-]+$"
    NoteId:
      name: noteId
      in: path
      required: true
      schema:
        type: string
        pattern: "^[a-zA-Z0-9-]+$"
  responses:
    Unauthorized:
      description: Login required
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    OkResponse:
      type: object
      required: [ok]
      properties:
        ok:
          type: boolean
    ErrorResponse:
      type: object
      required: [ok, error]
      properties:
        ok:
          type: boolean
        error:
          type: string
    SessionResponse:
      type: object
      required: [ok, user]
      properties:
        ok:
          type: boolean
        user:
          type: object
          required: [username]
          properties:
            username:
              type: string
    ShareResponse:
      type: object
      required: [ok, share]
      properties:
        ok:
          type: boolean
        share:
          $ref: "#/components/schemas/Share"
    Share:
      type: object
      required: [id, token, documentId, createdAt, sharePath]
      properties:
        id:
          type: string
        token:
          type: string
        documentId:
          type: string
        createdAt:
          type: string
        sharePath:
          type: string
    DocumentListItem:
      type: object
      required:
        - id
        - originalName
        - size
        - uploadedAt
        - convertedAt
        - hasAnalysis
        - analysisStatus
        - analysisProgress
        - activeAnalysisJobId
        - summary
      properties:
        id:
          type: string
        originalName:
          type: string
        size:
          type: integer
        uploadedAt:
          type: string
        convertedAt:
          type: string
        hasAnalysis:
          type: boolean
        analysisStatus:
          type: string
          enum: [idle, queued, running, succeeded, failed]
        analysisProgress:
          oneOf:
            - $ref: "#/components/schemas/AnalysisProgress"
            - type: "null"
        activeAnalysisJobId:
          type: string
        summary:
          type: string
    Document:
      type: object
      required:
        - id
        - originalName
        - size
        - uploadedAt
        - convertedAt
        - markdown
        - markdownBytes
        - pdfUrl
        - assets
        - analysis
        - analysisStatus
        - analysisProgress
        - activeAnalysisJobId
        - warnings
      properties:
        id:
          type: string
        originalName:
          type: string
        size:
          type: integer
        uploadedAt:
          type: string
        convertedAt:
          type: string
        markdown:
          type: string
        markdownBytes:
          type: integer
        pdfUrl:
          type: string
        assets:
          $ref: "#/components/schemas/AssetManifest"
        analysis:
          oneOf:
            - $ref: "#/components/schemas/Analysis"
            - type: "null"
        analysisStatus:
          type: string
          enum: [idle, queued, running, succeeded, failed]
        analysisProgress:
          oneOf:
            - $ref: "#/components/schemas/AnalysisProgress"
            - type: "null"
        activeAnalysisJobId:
          type: string
        warnings:
          type: string
    DocumentNoteAskRequest:
      type: object
      required: [page, anchorText, question]
      properties:
        page:
          type: integer
          minimum: 1
        anchorText:
          type: string
          minLength: 1
          maxLength: 1200
        question:
          type: string
          minLength: 1
          maxLength: 2000
        modelMode:
          type: string
          enum: [fast, deep]
          default: fast
        paragraph:
          type: string
          maxLength: 6000
        contextBefore:
          type: string
          maxLength: 6000
        contextAfter:
          type: string
          maxLength: 6000
    DocumentNoteMessageRequest:
      type: object
      required: [question]
      properties:
        question:
          type: string
          minLength: 1
          maxLength: 2000
        modelMode:
          type: string
          enum: [fast, deep]
          default: fast
    DocumentNoteMessage:
      type: object
      required: [id, role, content, createdAt]
      properties:
        id:
          type: string
        role:
          type: string
          enum: [user, assistant]
        content:
          type: string
        model:
          type: string
        modelMode:
          type: string
          enum: [fast, deep]
        status:
          type: string
          enum: [pending, completed, failed]
        error:
          type: string
        createdAt:
          type: string
    DocumentNote:
      type: object
      required:
        - id
        - documentId
        - page
        - anchorText
        - question
        - answer
        - status
        - context
        - messages
        - provider
        - model
        - modelMode
        - error
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
        documentId:
          type: string
        page:
          type: integer
          minimum: 1
        anchorText:
          type: string
        question:
          type: string
        answer:
          type: string
        status:
          type: string
          enum: [pending, running, completed, failed]
        context:
          type: object
          required: [sourceLanguage, paragraph, before, after]
          properties:
            sourceLanguage:
              type: string
              enum: [en]
            paragraph:
              type: string
            before:
              type: string
            after:
              type: string
        messages:
          type: array
          items:
            $ref: "#/components/schemas/DocumentNoteMessage"
        provider:
          type: string
        model:
          type: string
        modelMode:
          type: string
          enum: [fast, deep]
        error:
          type: string
        createdAt:
          type: string
        updatedAt:
          type: string
    AssetManifest:
      type: object
      properties:
        pageCount:
          type:
            - integer
            - "null"
        charts:
          type: array
          items:
            $ref: "#/components/schemas/Asset"
        pages:
          type: array
          items:
            $ref: "#/components/schemas/Asset"
        error:
          type: string
    Asset:
      type: object
      properties:
        kind:
          type: string
        page:
          type: integer
        file:
          type: string
        label:
          type: string
        url:
          type: string
    Analysis:
      type: object
      properties:
        id:
          type: string
        analysisVersion:
          type: integer
        generatedAt:
          type: string
        provider:
          type: string
        model:
          type: string
        pageLimit:
          type: integer
        isSample:
          type: boolean
        overall:
          type: object
          properties:
            summary:
              type: string
            bullets:
              type: array
              items:
                type: string
        pages:
          type: array
          items:
            type: object
    AnalysisJob:
      type: object
      required:
        - id
        - documentId
        - pageLimit
        - status
        - progress
        - createdAt
        - updatedAt
        - error
        - analysis
      properties:
        id:
          type: string
        documentId:
          type: string
        pageLimit:
          type: integer
        status:
          type: string
          enum: [queued, running, succeeded, failed]
        progress:
          $ref: "#/components/schemas/AnalysisProgress"
        createdAt:
          type: string
        updatedAt:
          type: string
        error:
          type: string
        analysis:
          oneOf:
            - $ref: "#/components/schemas/Analysis"
            - type: "null"
    AnalysisProgress:
      type: object
      required: [completed, total, percent, message]
      properties:
        completed:
          type: integer
        total:
          type: integer
        percent:
          type: integer
        message:
          type: string
