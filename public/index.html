<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>attn-viewer</title>
    <style>
      :root {
        color-scheme: dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        --page: #0f172a;
        --surface: #111827;
        --surface-2: #182235;
        --border: #334155;
        --border-soft: #263548;
        --text: #e5e7eb;
        --muted: #94a3b8;
        --muted-2: #cbd5e1;
        --primary: #2dd4bf;
        --primary-strong: #14b8a6;
        --danger: #fca5a5;
        --warning-bg: #451a03;
        --warning-border: #92400e;
        --warning-text: #fed7aa;
        background: var(--page);
        color: var(--text);
      }

      body[data-theme="light"] {
        color-scheme: light;
        --page: #f8fafc;
        --surface: #ffffff;
        --surface-2: #f8fafc;
        --border: #d0d5dd;
        --border-soft: #eaecf0;
        --text: #101828;
        --muted: #667085;
        --muted-2: #475467;
        --primary: #147d64;
        --primary-strong: #0f6b56;
        --danger: #b42318;
        --warning-bg: #fffaeb;
        --warning-border: #fedf89;
        --warning-text: #93370d;
      }

      * {
        box-sizing: border-box;
      }

      html {
        overflow-y: scroll;
        scrollbar-gutter: stable;
      }

      body {
        min-height: 100vh;
        margin: 0;
        background: var(--page);
        color: var(--text);
      }

      button,
      input,
      summary {
        font: inherit;
      }

      main {
        width: min(100%, 1280px);
        margin: 0 auto;
        padding: 14px 12px 32px;
      }

      body[data-view="chat"] {
        overflow: hidden;
      }

      body[data-view="chat"] main {
        width: 100%;
        max-width: none;
        height: 100svh;
        padding: 8px 12px 0;
      }

      body[data-view="chat"] #appView {
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
        height: 100%;
        min-height: 0;
      }

      body[data-view="chat"] .topbar {
        padding-bottom: 8px;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 4px 0 12px;
      }

      .primary-nav {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      [hidden] {
        display: none !important;
      }

      .topbar-actions {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      h1,
      h2,
      h3,
      p {
        margin: 0;
      }

      h1 {
        font-size: 20px;
        font-weight: 700;
        letter-spacing: 0;
      }

      .status-pill {
        min-width: 72px;
        border: 1px solid var(--border);
        border-radius: 999px;
        padding: 7px 10px;
        background: var(--surface);
        color: var(--muted-2);
        font-size: 13px;
        text-align: center;
        white-space: nowrap;
      }

      .user-pill {
        border-color: #bbd6cc;
        background: #f2fbf7;
        color: #147d64;
      }

      .surface {
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--surface);
      }

      .login {
        max-width: 390px;
        margin: 14vh auto 0;
        padding: 18px;
      }

      .login-form {
        display: grid;
        gap: 12px;
        margin-top: 18px;
      }

      .field {
        display: grid;
        gap: 6px;
      }

      .field label {
        color: var(--muted-2);
        font-size: 13px;
        font-weight: 700;
      }

      .field input {
        width: 100%;
        min-height: 46px;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 0 12px;
        background: var(--surface-2);
        color: var(--text);
      }

      .field input:focus {
        border-color: var(--primary);
        outline: 3px solid color-mix(in srgb, var(--primary) 28%, transparent);
      }

      .upload.is-dragging {
        border-color: var(--primary);
        background: color-mix(in srgb, var(--primary) 12%, var(--surface));
      }

      .upload-header {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .section-title {
        font-size: 17px;
        line-height: 1.3;
        font-weight: 700;
        letter-spacing: 0;
      }

      .file-name,
      .meta,
      .feedback {
        color: #667085;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.5;
        overflow-wrap: anywhere;
      }

      .actions {
        display: grid;
        grid-template-columns: 1fr;
        gap: 10px;
        margin-top: 14px;
      }

      .button {
        min-height: 48px;
        border: 1px solid var(--primary-strong);
        border-radius: 8px;
        padding: 0 14px;
        background: var(--primary-strong);
        color: #ffffff;
        font-weight: 700;
        cursor: pointer;
      }

      .button.secondary {
        border-color: var(--border);
        background: var(--surface);
        color: var(--text);
      }

      .button.compact {
        min-height: 34px;
        padding: 0 10px;
        font-size: 13px;
      }

      .icon-button {
        display: inline-grid;
        place-items: center;
        width: 38px;
        min-width: 38px;
        height: 38px;
        min-height: 38px;
        padding: 0;
        font-size: 18px;
        line-height: 1;
      }

      .icon-button.is-active {
        border-color: var(--primary);
        color: var(--primary);
      }

      .reader-toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 12px;
      }

      .reader-actions {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .view {
        display: block;
      }

      .view[hidden] {
        display: none !important;
      }

      .button:disabled {
        border-color: var(--border);
        background: var(--surface-2);
        color: var(--muted);
        cursor: not-allowed;
      }

      .feedback {
        min-height: 22px;
        margin-top: 12px;
      }

      .feedback.error {
        color: var(--danger);
      }

      .toast {
        position: fixed;
        left: 50%;
        bottom: 18px;
        z-index: 20;
        transform: translateX(-50%);
        max-width: min(92vw, 420px);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 10px 12px;
        background: var(--surface);
        color: var(--text);
        box-shadow: 0 12px 30px rgb(0 0 0 / 22%);
        font-size: 14px;
        font-weight: 700;
        text-align: center;
      }

      .toast.error {
        border-color: color-mix(in srgb, var(--danger) 55%, var(--border));
        color: var(--danger);
      }

      .confirm-backdrop {
        position: fixed;
        inset: 0;
        z-index: 80;
        display: grid;
        place-items: center;
        padding: 18px;
        background: rgb(0 0 0 / 34%);
      }

      .confirm-dialog {
        display: grid;
        gap: 14px;
        width: min(92vw, 360px);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 16px;
        background: var(--surface);
        box-shadow: 0 18px 50px rgb(0 0 0 / 28%);
      }

      .confirm-title {
        margin: 0;
        color: var(--text);
        font-size: 16px;
        font-weight: 800;
        line-height: 1.35;
      }

      .confirm-message {
        margin: 0;
        color: var(--muted-2);
        font-size: 14px;
        line-height: 1.5;
        overflow-wrap: anywhere;
      }

      .confirm-actions {
        display: flex;
        justify-content: flex-end;
        gap: 8px;
      }

      .confirm-actions .button {
        min-height: 36px;
      }

      .confirm-danger {
        border-color: var(--danger);
        background: var(--danger);
      }

      .document-list {
        margin-top: 12px;
        padding: 0;
        border: 0;
        background: transparent;
      }

      .list-head {
        display: none;
      }

      .list-items {
        display: grid;
        grid-template-columns: 1fr;
        gap: 10px;
      }

      .doc-item {
        display: grid;
        width: 100%;
        min-height: 236px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--surface-2);
        color: var(--text);
        text-align: left;
        overflow: hidden;
      }

      .upload-card {
        min-height: 236px;
        padding: 12px;
      }

      .upload-card .actions {
        grid-template-columns: 1fr;
        gap: 8px;
        max-width: none;
        margin-top: 12px;
      }

      .upload-card .button {
        min-height: 42px;
      }

      .upload-card .feedback {
        margin-top: 10px;
      }

      .empty-doc-card {
        padding: 12px;
        min-height: 120px;
      }

      .analysis-view {
        display: grid;
        gap: 12px;
      }

      .analysis-reader {
        display: grid;
        gap: 8px;
        min-height: 0;
      }

      .analysis-reader .reader-toolbar {
        position: sticky;
        top: 0;
        z-index: 41;
        margin: 0 0 12px;
        padding: 8px 0;
        background: var(--page);
      }

      .analysis-reader iframe {
        display: block;
        width: 100%;
        min-height: 0;
        border: 0;
        background: var(--page);
        overflow: hidden;
      }

      .doc-item.is-active {
        border-color: var(--border);
      }

      .doc-item-main {
        display: grid;
        gap: 8px;
        grid-template-rows: auto auto 1fr;
        width: 100%;
        min-height: 100%;
        border: 0;
        padding: 12px;
        background: transparent;
        color: inherit;
        text-align: left;
        cursor: pointer;
      }

      .danger-button {
        color: var(--danger);
      }

      .doc-item-title {
        font-size: 14px;
        font-weight: 800;
        overflow-wrap: anywhere;
      }

      .doc-item-meta {
        color: var(--muted);
        font-size: 12px;
        line-height: 1.45;
      }

      .doc-item-summary {
        color: var(--muted-2);
        font-size: 13px;
        line-height: 1.55;
        overflow: hidden;
        display: -webkit-box;
        -webkit-box-orient: vertical;
        -webkit-line-clamp: 3;
      }

      .progress-wrap {
        display: grid;
        gap: 7px;
      }

      .progress-wrap[hidden] {
        display: none !important;
      }

      .progress-track {
        width: 100%;
        height: 8px;
        overflow: hidden;
        border-radius: 999px;
        background: var(--border-soft);
      }

      .progress-fill {
        width: var(--progress, 0%);
        height: 100%;
        border-radius: inherit;
        background: var(--primary);
        transition: width 180ms ease;
      }

      .progress-label {
        color: var(--muted);
        font-size: 12px;
        line-height: 1.4;
      }

      .document {
        display: none;
        margin-top: 14px;
      }

      .document.is-visible {
        display: block;
      }

      .document-header {
        display: flex;
        flex-direction: column;
        gap: 6px;
        padding: 0 0 12px;
      }

      .document-title-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 8px;
        align-items: start;
      }

      .document-body {
        display: grid;
        gap: 12px;
      }

      .document-title {
        font-size: 18px;
        font-weight: 700;
        line-height: 1.35;
        letter-spacing: 0;
        overflow-wrap: anywhere;
      }

      .document-title-edit {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto auto;
        gap: 8px;
      }

      .document-title-edit input {
        min-width: 0;
        min-height: 38px;
        border: 1px solid var(--border);
        border-radius: 7px;
        padding: 0 10px;
        background: var(--surface-2);
        color: var(--text);
        font: inherit;
      }

      .summary-panel {
        display: grid;
        gap: 12px;
        align-items: start;
        align-content: start;
        margin: 0;
      }

      .summary-empty {
        margin: 0;
        padding: 14px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--surface);
        color: var(--muted-2);
        font-size: 14px;
        line-height: 1.55;
      }

      .summary-text {
        margin: 0;
        padding: 14px 12px;
        color: var(--muted-2);
        font-size: 14px;
        line-height: 1.6;
      }

      .summary-list {
        margin: 0;
        padding: 14px 12px 14px 30px;
        color: var(--muted-2);
        font-size: 14px;
        line-height: 1.6;
      }

      .summary-item {
        border-radius: 6px;
        transition: background-color 140ms ease, color 140ms ease;
      }

      .summary-link {
        display: block;
        width: 100%;
        border: 0;
        padding: 3px 4px;
        background: transparent;
        color: inherit;
        font: inherit;
        line-height: inherit;
        text-align: left;
        cursor: pointer;
      }

      .summary-item.is-active {
        background: color-mix(in srgb, var(--primary) 14%, transparent);
        color: var(--text);
      }

      .summary-item.is-active::marker {
        color: var(--primary);
      }

      .summary-actions {
        margin-top: 14px;
      }

      .sample-note {
        color: var(--muted);
        font-size: 13px;
        line-height: 1.45;
      }

      details {
        margin: 0;
      }

      details:not([open]) > :not(summary) {
        display: none;
      }

      summary {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        min-height: 46px;
        padding: 0 12px;
        border-radius: 8px;
        color: var(--text);
        font-weight: 700;
        cursor: pointer;
        list-style: none;
      }

      summary::-webkit-details-marker {
        display: none;
      }

      summary::after {
        content: "+";
        color: var(--muted);
        font-size: 18px;
        line-height: 1;
      }

      details[open] summary::after {
        content: "-";
      }

      .original-body,
      .snapshot-body {
        border-top: 1px solid var(--border-soft);
        padding: 10px;
      }

      .open-link {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        min-height: 42px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--surface-2);
        color: var(--primary);
        font-size: 14px;
        font-weight: 700;
        text-decoration: none;
      }

      .count {
        color: var(--muted);
        font-size: 13px;
        font-weight: 700;
        white-space: nowrap;
      }

      .asset-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 10px;
      }

      .asset {
        display: block;
        border: 1px solid var(--border-soft);
        border-radius: 8px;
        overflow: hidden;
        background: var(--surface);
        color: var(--muted-2);
        text-decoration: none;
      }

      .asset img {
        display: block;
        width: 100%;
        height: auto;
        background: var(--surface-2);
      }

      .asset-label {
        display: block;
        padding: 8px 10px;
        border-top: 1px solid var(--border-soft);
        color: var(--muted-2);
        font-size: 13px;
        font-weight: 700;
      }

      .document-tools {
        display: grid;
        gap: 12px;
        align-content: start;
      }

      .document-tools > :first-child {
        margin-top: 0;
      }

      .markdown-section {
        margin-top: 0;
        padding: 0;
        border: 0;
        background: transparent;
        box-shadow: none;
        overflow: visible;
      }

      .reader {
        margin: 0;
        padding: 0;
        color: var(--text);
        background: transparent;
      }

      .flow-page {
        margin: 0 0 20px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--surface);
        overflow: hidden;
      }

      .flow-page:last-child {
        margin-bottom: 0;
      }

      .page-marker {
        display: flex;
        align-items: center;
        min-height: 42px;
        padding: 0 14px;
        border-bottom: 1px solid var(--border-soft);
        background: var(--surface-2);
        color: var(--muted-2);
        font-size: 13px;
        font-weight: 700;
        text-transform: uppercase;
      }

      .flow-paragraph {
        margin: 0;
        padding: 16px 14px 0;
        white-space: pre-wrap;
        overflow-wrap: anywhere;
        font-size: 16px;
        line-height: 1.74;
      }

      .paragraph-block {
        padding: 16px 14px 4px;
        border-left: 3px solid transparent;
        transition: background-color 140ms ease, border-color 140ms ease;
        scroll-margin-top: 72px;
      }

      .paragraph-block.is-active {
        border-left-color: var(--primary);
        background: color-mix(in srgb, var(--primary) 7%, transparent);
      }

      .paragraph-note {
        margin-bottom: 12px;
        border-left: 3px solid var(--primary);
        padding: 10px 12px;
        background: color-mix(in srgb, var(--primary) 12%, var(--surface));
      }

      .note-click-target {
        position: relative;
        cursor: pointer;
      }

      .note-click-target.has-note::after {
        content: "";
        position: absolute;
        top: 8px;
        right: 6px;
        z-index: 2;
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--primary);
      }

      .note-click-target.has-note.is-pending-note::after {
        width: 7px;
        height: 7px;
        background: #facc15;
        box-shadow: 0 0 0 2px color-mix(in srgb, #facc15 22%, transparent);
      }

      .summary-text .overall-note-target {
        display: block;
        margin: 0 0 8px;
        padding-right: 16px;
      }

      .overall-note-target:hover {
        color: var(--text);
      }

      .summary-bullet-block {
        color: var(--muted-2);
      }

      .note-label {
        display: block;
        margin-bottom: 4px;
        color: var(--primary);
        font-size: 12px;
        font-weight: 800;
      }

      .paragraph-note p,
      .chart-note p {
        margin: 0;
        color: var(--muted-2);
        font-size: 14px;
        line-height: 1.55;
      }

      .note-status {
        display: none;
        margin: 4px 0 0;
        border: 1px solid color-mix(in srgb, var(--primary) 45%, var(--border));
        border-radius: 8px;
        padding: 9px 10px;
        background: color-mix(in srgb, var(--primary) 10%, var(--surface));
        color: var(--muted-2);
        font-size: 13px;
        font-weight: 700;
        line-height: 1.45;
      }

      .note-status.is-visible {
        display: block;
      }

      .note-sheet {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 40;
        display: grid;
        gap: 10px;
        max-height: 78vh;
        border: 1px solid var(--border);
        border-radius: 8px 8px 0 0;
        padding: 14px;
        background: var(--surface);
        box-shadow: 0 -16px 36px rgb(0 0 0 / 28%);
      }

      .sheet-backdrop {
        position: fixed;
        inset: 0;
        z-index: 39;
        background: transparent;
      }

      #noteViewSheet .note-sheet-head,
      #chatNoteViewSheet .note-sheet-head {
        order: 1;
      }

      #noteViewSelection,
      #chatNoteViewSelection {
        order: 2;
        grid-column: auto;
        grid-row: auto;
      }

      #noteViewQuestion,
      #chatNoteViewQuestion {
        order: 3;
      }

      #noteViewThread,
      #chatNoteViewThread {
        order: 4;
      }

      #noteViewSheet .note-input-wrap,
      #chatNoteViewSheet .note-input-wrap {
        order: 5;
      }

      .note-sheet-head {
        display: grid;
        grid-template-columns: auto 1fr auto;
        align-items: center;
        gap: 10px;
        min-height: 34px;
      }

      .note-sheet-actions {
        grid-column: 3;
        display: grid;
        grid-auto-flow: column;
        grid-auto-columns: 34px;
        align-items: center;
        justify-content: end;
        gap: 6px;
      }

      .note-sheet-actions .icon-button {
        display: grid;
        place-items: center;
        width: 34px;
        min-width: 34px;
        height: 34px;
        min-height: 34px;
        border-radius: 7px;
        padding: 0;
        font-size: 18px;
        line-height: 1;
      }

      .toolbar-icon {
        display: block;
        width: 17px;
        height: 17px;
        stroke: currentColor;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
        fill: none;
      }

      .note-input-wrap {
        display: grid;
        grid-template-columns: minmax(0, 9fr) minmax(46px, 1fr);
        grid-template-rows: auto minmax(92px, 1fr);
        gap: 8px;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 8px;
        background: var(--surface-2);
      }

      .note-input-wrap.reply {
        grid-template-rows: minmax(68px, 1fr);
      }

      .note-input-wrap.reply .note-question {
        grid-row: 1;
      }

      .note-input-wrap.reply .note-send {
        grid-row: 1;
      }

      .note-input-main {
        display: contents;
        min-width: 0;
      }

      .note-selected {
        min-width: 0;
        margin: 0;
        color: var(--muted-2);
        font-size: 14px;
        line-height: 1.45;
        overflow-wrap: anywhere;
      }

      .note-selected.tag {
        max-width: 100%;
        border: 1px solid color-mix(in srgb, var(--primary) 45%, var(--border));
        border-radius: 5px;
        padding: 5px 9px;
        background: color-mix(in srgb, var(--primary) 12%, var(--surface));
        color: var(--text);
        font-size: 13px;
        font-weight: 800;
        display: block;
        line-height: 1.45;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .note-input-wrap .note-selected.tag {
        grid-column: 1;
        grid-row: 1;
      }

      .note-question {
        grid-column: 1;
        grid-row: 2;
        width: 100%;
        min-height: 100%;

        border: 0;

        color: var(--text);

      .note-answer {
        max-height: 45vh;
        overflow-y: auto;
        color: var(--muted-2);
        font-size: 14px;
        line-height: 1.6;
        white-space: pre-wrap;

      .note-thread {
        display: grid;
        gap: 8px;
        max-height: 42vh;
        overflow-y: auto;
      }

      .analysis-chat-title {
        min-width: 0;
        color: var(--text);
        font-size: 14px;
        font-weight: 800;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .analysis-chat-tabs {

        gap: 6px;
        height: 38px;
        min-width: 0;
        overflow-x: auto;
        overflow-y: hidden;

        -ms-overflow-style: none;

      .analysis-chat-tabs::-webkit-scrollbar {
        display: none;

      .analysis-chat-tab {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        flex: 0 0 auto;
        max-width: 180px;
        min-height: 34px;

        border-radius: 8px;
        padding: 0 10px;
        background: var(--surface-2);
        color: var(--muted-2);
        font-size: 13px;
        font-weight: 800;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;

      .analysis-chat-tab-label {

        overflow: hidden;
        text-overflow: ellipsis;

        height: 18px;

        color: var(--muted-2);
        font-size: 15px;
        line-height: 1;

      .analysis-chat-tab-delete:hover {
        color: var(--danger);

      .analysis-chat-tab.is-active {
        border-color: var(--primary);
        color: var(--text);
      }

      .analysis-chat-sheet {
        height: min(78vh, 620px);
        grid-template-rows: 34px 38px minmax(0, 1fr) 86px;
      }

      .analysis-chat-thread {
        align-content: start;
        min-height: 0;
        max-height: none;
        overflow-y: auto;
      }

      .analysis-chat-thread .note-message {
        width: fit-content;
        max-width: min(92%, 760px);
        text-align: left;
      }

      .analysis-chat-thread .note-message.user {
        justify-self: end;
        max-width: min(86%, 620px);
      }

      .analysis-chat-thread .note-message.assistant {
        justify-self: start;
      }

      .chat-view {
        display: grid;
        height: 100%;
        min-height: 0;
        overflow: hidden;
      }

      .chat-layout {
        display: grid;
        grid-template-rows: minmax(0, 1fr);
        gap: 0;
        height: 100%;
        min-height: 0;
      }

      .chat-history,
      .chat-main {
        display: grid;
        gap: 10px;
        min-width: 0;
        min-height: 0;
        padding: 12px;
      }

      .chat-history {
        position: fixed;
        top: 0;
        bottom: 0;
        left: 0;
        z-index: 55;
        width: min(84vw, 320px);
        grid-template-rows: auto minmax(0, 1fr);
        overflow: hidden;
        border-radius: 0;
        border-right: 1px solid var(--border);
        transform: translateX(-105%);
        transition: transform 180ms ease;

      body.is-chat-history-open .chat-history {
        transform: translateX(0);
      }

      .chat-history-backdrop {
        position: fixed;
        inset: 0;
        z-index: 54;
        background: rgb(0 0 0 / 42%);
      }

      .chat-main {
        position: relative;
        grid-template-rows: auto minmax(0, 1fr) auto;
        overflow: hidden;
        border: 0;
        border-radius: 0;
        background: transparent;
        box-shadow: none;

      .chat-history-head,
      .chat-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        min-width: 0;
      }

      .chat-history-head {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
      }

      .chat-history-actions {
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .chat-head-main {
        display: flex;
        align-items: center;
        gap: 10px;
        min-width: 0;
      }

      .chat-icon-button,
      .chat-sidebar-button,
      .chat-main-sidebar-button {
        flex: 0 0 auto;
        color: var(--muted-2);
        border: 0;
        background: transparent;
      }

      .chat-icon-button:hover,
      .chat-icon-button:focus-visible,
      .chat-sidebar-button:hover,
      .chat-sidebar-button:focus-visible,
      .chat-main-sidebar-button:hover,
      .chat-main-sidebar-button:focus-visible {
        border: 0;
        background: transparent;
        color: var(--text);
      }

      body.is-chat-history-open .chat-main-sidebar-button {
        display: none;
      }

      .chat-history-list {
        display: grid;
        align-content: start;
        gap: 8px;
        min-width: 0;
        overflow-y: auto;
        overflow-x: hidden;
        padding-bottom: 2px;
        scrollbar-width: none;
      }

      .chat-history-list::-webkit-scrollbar {
        display: none;
      }

      .chat-history-item {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 30px;
        gap: 4px;
        min-height: 58px;
        border: 1px solid transparent;
        border-radius: 8px;
        padding: 8px 6px 8px 10px;
        background: transparent;
        color: var(--text);
        text-align: left;
        cursor: pointer;
      }

      .chat-history-item-main {
        display: grid;
        gap: 4px;
        min-width: 0;
      }

      .chat-history-delete {
        display: grid;
        place-items: center;
        align-self: center;
        width: 30px;
        height: 30px;
        border: 0;
        border-radius: 7px;
        background: transparent;
        color: var(--danger);
        opacity: 0;
      }

      .chat-history-item:hover .chat-history-delete,
      .chat-history-item:focus-within .chat-history-delete {
        opacity: 1;
      }

      .chat-history-delete:hover,
      .chat-history-delete:focus-visible {
        background: color-mix(in srgb, var(--danger) 11%, transparent);
      }

      @media (hover: none) {
        .chat-history-delete {
          opacity: 0.72;
        }
      }

      .chat-history-item.is-active {
        border-color: color-mix(in srgb, var(--primary) 28%, var(--border));
        background: color-mix(in srgb, var(--primary) 9%, transparent);
      }

      .chat-history-title,
      .chat-title {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-weight: 800;
      }

      .chat-history-meta,
      .chat-meta,
      .chat-empty {
        color: var(--muted);
        font-size: 13px;
        line-height: 1.45;
      }

      .chat-thread {
        display: grid;
        align-content: start;
        gap: 10px;
        min-height: 0;
        max-height: none;
        overflow-y: auto;
        padding: 6px 2px 12px;
        overscroll-behavior: contain;
      }

      .chat-message {
        display: grid;
        gap: 6px;
        width: fit-content;
        max-width: min(92%, 760px);
        border: 1px solid var(--border-soft);
        border-radius: 8px;
        padding: 10px;
        background: var(--surface-2);
        color: var(--muted-2);
        font-size: 14px;
        line-height: 1.55;
        white-space: pre-wrap;
        cursor: pointer;
      }

      .chat-message.user {
        justify-self: end;
        border-color: color-mix(in srgb, var(--primary) 38%, var(--border));
        color: var(--text);
      }

      .chat-message.has-subnote {
        position: relative;
        padding-right: 22px;
      }

      .chat-message.has-subnote::after {
        content: "";
        position: absolute;
        top: 9px;
        right: 8px;
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--primary);
      }

      .chat-message.has-subnote.is-pending-subnote::after {
        background: #facc15;
        box-shadow: 0 0 0 2px color-mix(in srgb, #facc15 22%, transparent);
      }

      .chat-message-content {
        white-space: pre-wrap;
      }

      .chat-ask-sheet {
        z-index: 42;
      }

      .chat-composer {
        display: grid;
        gap: 8px;
        border-top: 1px solid var(--border-soft);
        padding-top: 10px;
      }

      .chat-control-row {
        display: flex;
        align-items: center;
        gap: 5px;
        min-width: 0;
        overflow-x: auto;
        scrollbar-width: none;
      }

      .chat-provider-row,
      .chat-think-row {
        display: flex;
        gap: 4px;
        flex: 0 0 auto;
        min-width: 0;
      }

      .chat-control-row::-webkit-scrollbar,
      .chat-provider-row::-webkit-scrollbar,
      .chat-think-row::-webkit-scrollbar {
        display: none;
      }

      .chat-control-separator {
        flex: 0 0 auto;
        color: var(--muted);
        font-weight: 800;
      }

      .chat-toggle input {
        position: absolute;
        opacity: 0;
        pointer-events: none;
      }

      .chat-toggle span {
        display: inline-grid;
        place-items: center;
        min-width: 0;
        min-height: 34px;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 0 7px;
        background: var(--surface-2);
        color: var(--muted-2);
        font-size: 13px;
        font-weight: 900;
      }

      @media (max-width: 430px) {
        .chat-control-row {
          gap: 3px;
        }

        .chat-provider-row,
        .chat-think-row {
          gap: 3px;
        }

        .chat-toggle span {
          min-height: 32px;
          padding: 0 4px;
          font-size: 12px;
        }
      }

      .chat-toggle input:checked + span {
        border-color: var(--primary);
        background: color-mix(in srgb, var(--primary) 16%, var(--surface-2));
        color: var(--text);
      }

      .chat-input-wrap {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 48px;
        gap: 8px;
      }

      .chat-question {
        width: 100%;
        min-height: 72px;
        max-height: 180px;
        resize: vertical;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 10px;
        background: var(--surface-2);
        color: var(--text);
        font: inherit;
        line-height: 1.45;
      }

      .chat-send {
        min-height: 72px;
        border-radius: 8px;
        font-size: 20px;
      }

      .note-message {
        border: 1px solid var(--border-soft);
        border-radius: 8px;
        padding: 9px 10px;
        background: var(--surface-2);
        color: var(--muted-2);
        font-size: 14px;
        line-height: 1.55;
        white-space: pre-wrap;
      }

      .note-message.user {
        border-color: color-mix(in srgb, var(--primary) 38%, var(--border));
        color: var(--text);
      }

      .note-delete {
        color: var(--danger);
      }

      .semantic-title {
        margin: 0 0 10px;
        color: var(--text);
        font-size: 15px;
        font-weight: 800;
        line-height: 1.45;
      }

      .sentence-pair {
        position: relative;
        padding: 10px 0 12px;
        border-bottom: 1px solid var(--border-soft);
        cursor: pointer;
        overflow: hidden;
      }

      .sentence-pair.has-note::before {
        content: "";
        position: absolute;
        top: 10px;
        right: 2px;
        z-index: 2;
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--primary);
      }

      .sentence-pair.has-note.is-pending-note::before {
        width: 7px;
        height: 7px;
        background: #facc15;
        box-shadow: 0 0 0 2px color-mix(in srgb, #facc15 22%, transparent);
      }

      .sentence-pair:last-child {
        border-bottom: 0;
      }

      .source-sentence {
        position: relative;
        z-index: 1;
        margin: 0;
        color: var(--text);
        font-size: 15px;
        line-height: 1.7;
        overflow-wrap: anywhere;
      }

      .translated-sentence {
        position: relative;
        z-index: 1;
        margin: 5px 0 0;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.65;
        overflow-wrap: anywhere;
      }

      .flow-asset {
        margin: 16px 12px 2px;
        border: 1px solid var(--border-soft);
        border-radius: 8px;
        overflow: hidden;
        background: var(--surface);
      }

      .flow-asset a {
        display: block;
      }

      .flow-asset img {
        display: block;
        width: 100%;
        height: auto;
        background: var(--surface-2);
      }

      .flow-asset figcaption {
        padding: 8px 10px;
        border-top: 1px solid var(--border-soft);
        color: var(--muted-2);
        font-size: 13px;
        font-weight: 700;
      }

      .chart-note {
        padding: 10px 12px 12px;
        border-top: 1px solid var(--border-soft);
        background: var(--surface-2);
      }

      .warnings {
        display: none;
        margin-top: 10px;
        border: 1px solid var(--warning-border);
        border-radius: 8px;
        padding: 10px 12px;
        background: var(--warning-bg);
        color: var(--warning-text);
        font-size: 13px;
        line-height: 1.45;
        white-space: pre-wrap;
        overflow-wrap: anywhere;
      }

      .warnings.is-visible {
        display: block;
      }

      @media (min-width: 620px) {
        main {
          padding: 22px 20px 40px;
        }

        .actions {
          grid-template-columns: repeat(3, minmax(0, 1fr));
          max-width: 680px;
        }

        .upload-card .actions {
          grid-template-columns: 1fr;
          max-width: none;
        }

        .asset-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .list-items {
          grid-template-columns: repeat(2, minmax(0, 1fr));
          grid-auto-rows: 236px;
        }
      }

      @media (max-width: 720px) {
        .source-sentence,
        .translated-sentence {
          touch-action: pan-y;
        }
      }

      @media (min-width: 920px) {
        .topbar {
          padding-top: 8px;
          padding-bottom: 16px;
        }

        .document-list {
          padding: 0;
        }

        .list-items {
          grid-template-columns: repeat(3, minmax(0, 1fr));
          grid-auto-rows: 236px;
          align-items: stretch;
        }

        .doc-item {
          min-height: 236px;
        }

        .doc-item-main {
          grid-template-rows: auto auto 1fr;
        }

        .asset-grid {
          grid-template-columns: repeat(3, minmax(0, 1fr));
        }
      }

      @media (min-width: 1100px) {
        .reader-toolbar {
          position: sticky;
          top: 0;
          z-index: 3;
          margin: 0 0 14px;
          padding: 8px 0;
          background: var(--page);
        }

        .document-header {
          padding-top: 0;
        }

        .document-body {
          grid-template-columns: minmax(360px, 400px) minmax(0, 1fr);
          align-items: start;
        }

        .chat-layout {
          grid-template-columns: minmax(240px, 292px) minmax(0, 1fr);
          grid-template-rows: minmax(0, 1fr);
          align-items: stretch;
          min-height: 0;
        }

        body.is-chat-history-collapsed .chat-layout {
          grid-template-columns: minmax(0, 1fr);
        }

        .chat-history {
          position: static;
          width: auto;
          border: 0;
          border-right: 1px solid var(--border);
          border-radius: 0;
          background: transparent;
          box-shadow: none;
          transform: none;
          transition: none;
        }

        .chat-main-sidebar-button {
          display: none;
        }

        body.is-chat-history-collapsed .chat-main-sidebar-button {
          display: grid;
        }

        body.is-chat-history-collapsed .chat-history {
          display: none !important;
        }

        .chat-history-backdrop {
          display: none !important;
        }

        .chat-history-list {
          display: grid;
          align-content: start;
          overflow-y: auto;
          overflow-x: hidden;
        }

        .chat-history-item {
          flex-basis: auto;
        }

        .chat-thread {
          max-height: none;
        }

        .chat-question {
          min-height: 144px;
          max-height: 320px;
        }

        .chat-send {
          min-height: 144px;
        }

        .summary-panel {
          margin-top: 0;
        }

        .document-tools {
          position: sticky;
          top: 58px;
          grid-template-rows: auto auto minmax(220px, 1fr);
          max-height: calc(100vh - 72px);
          overflow-y: auto;
          overscroll-behavior: contain;
          padding-right: 2px;
          scrollbar-gutter: stable;
        }

        #pageDetails[open] {
          min-height: 0;
        }

        #pageDetails[open] .snapshot-body {
          max-height: min(42vh, 460px);
          overflow-y: auto;
          overscroll-behavior: contain;
          scrollbar-gutter: stable;
        }

        #overallSummaryDetails[open] .summary-text,
        #paragraphSummaryDetails[open] .summary-list {
          max-height: min(42vh, 460px);
          overflow-y: auto;
          overscroll-behavior: contain;
          scrollbar-gutter: stable;
        }

        .summary-panel {
          min-height: 0;
        }

        .markdown-section {
          margin-top: 0;
        }

        .note-sheet {
          left: auto;
          right: 18px;
          bottom: 18px;
          width: min(420px, calc(100vw - 36px));
          border-radius: 8px;
        }

      }

      async function loadDocument(id, options = {}) {
        try {
          setFeedback("글 불러오는 중");
          const response = await fetch(`/api/documents/${id}`);
          await ensureAuthorized(response);
          const data = await response.json();
          if (!response.ok || !data.ok) {
            throw new Error(data.error || "글을 불러오지 못했습니다.");
          }
          const state = { view: "reader", documentId: id };
          if (!options.preserveHistory) {
            const nextHash = getRouteHash(state);
            if (location.hash === nextHash) {
              history.replaceState(state, "", nextHash);
            } else {
              history.pushState(state, "", nextHash);
            }
          }
          currentView = "reader";
          renderDocument(data.document);
          applyRoute(state);
          setFeedback("");
        } catch (error) {
          setFeedback(error.message || "글을 불러오지 못했습니다.", true);
        }
      }

      function renderDocument(document, options = {}) {
        const previousNotes =
          currentDocument?.id === document.id && Array.isArray(currentDocument.notes)
            ? currentDocument.notes
            : [];
        isShareView = Boolean(options.shared);
        currentDocument = { ...document, notes: isShareView ? [] : previousNotes };
        activePollJobId = "";
        mountDocumentForView(currentView);
        const assets = document.assets || {};
        const charts = assets.charts || [];
        const pages = assets.pages || [];
        const hasActiveAnalysisJob =
          !document.analysis &&
          ["queued", "running"].includes(document.analysisStatus) &&
          document.activeAnalysisJobId;

        documentTitle.textContent = document.originalName;
        cancelTitleEdit();
        editTitleButton.hidden = isShareView;
        documentMeta.textContent = [
          document.size ? formatBytes(document.size) : "",
          document.markdownBytes ? `${formatBytes(document.markdownBytes)} markdown` : "",
          assets.pageCount ? `${assets.pageCount} pages` : "",
          document.convertedAt ? `converted ${formatDate(document.convertedAt)}` : "",
        ]
          .filter(Boolean)
          .join(" · ");

        openPdf.href = document.pdfUrl;
        hideAnalysisProgress();
        if (hasActiveAnalysisJob) {
          renderAnalysisProgress({
            documentId: document.id,
            status: document.analysisStatus,
            progress: document.analysisProgress,
          });
        } else {
          renderSummary(document.analysis);
        }
        resetSummaryPanelScroll();
        renderReadingFlow(document.markdown || "", charts, document.analysis);
        stopNotesPolling();

        renderAssetGrid(pageGrid, pages);
        pageDetails.style.display = pages.length > 0 ? "block" : "none";

        const warningText = [document.warnings, assets.error].filter(Boolean).join("\n\n");
        warnings.textContent = warningText;
        warnings.classList.toggle("is-visible", Boolean(warningText));
        renderNoteStatus();

        originalDetails.open = false;
        pageDetails.open = false;
        resetSummaryPanelScroll();
        documentSection.classList.add("is-visible");
        setAnalyzeEnabled(!isShareView && canAnalyzeDocument(document));
        shareButton.hidden = isShareView;
        readerDeleteButton.hidden = isShareView;
        if (!isShareView) {
          renderDocumentList();
          loadDocumentNotes(document.id).catch((error) => {
            setFeedback(formatRequestError(error, "메모를 불러오지 못했습니다."), true);
          });
        }
        if (!isShareView && hasActiveAnalysisJob) {
          watchAnalysisJob(document.activeAnalysisJobId).catch((error) => {
            setStatus("Error");
            setFeedback(formatRequestError(error, "번역 상태 확인 실패"), true);
            setAnalyzeEnabled(canAnalyzeDocument(currentDocument));
          });
        }
      }

        cards.push(...documents.map((doc) => createDocumentCard(doc)));
        documentList.replaceChildren(...cards);

      async function toggleAnalysisChat() {
        if (!analysisChatSheet.hidden) {
          closeAnalysisChat();

        await openAnalysisChat();

      function closeAnalysisChat() {
        analysisChatSheet.hidden = true;
        sheetBackdrop.hidden = true;
        analysisChatQuestion.value = "";
        stopAnalysisChatPolling();
      }

      async function loadAnalysisChat() {
        if (!currentAnalysisFile) {
          return;
        }
        try {
          const response = await fetch(`/api/analysis-html/${encodeURIComponent(currentAnalysisFile)}/chats`);
          await ensureAuthorized(response);
          const data = await response.json();
          if (!response.ok || !data.ok) {
            throw new Error(data.error || "LLM 대화를 불러오지 못했습니다.");
          }
          analysisChat = data.chat || { file: currentAnalysisFile, threads: [] };
          if (!analysisChat.threads.some((thread) => thread.id === activeAnalysisThreadId)) {
            activeAnalysisThreadId = analysisChat.threads[0]?.id || "";
          }
          renderAnalysisChat();
          if (analysisChat.threads.some((thread) => ["pending", "running"].includes(thread.status))) {
            startAnalysisChatPolling();
          } else {
            stopAnalysisChatPolling();
          }
        } catch (error) {
          showToast(formatRequestError(error, "LLM 대화를 불러오지 못했습니다."), true);
        }
      }

      async function createAnalysisChatThread() {
        if (!currentAnalysisFile) {
          return null;
        }
        analysisChatNewButton.disabled = true;
        try {
          const response = await fetch(`/api/analysis-html/${encodeURIComponent(currentAnalysisFile)}/chats`, {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({}),
          });
          await ensureAuthorized(response);
          const data = await response.json();
          if (!response.ok || !data.ok) {
            throw new Error(data.error || "새 질문을 만들지 못했습니다.");
          }
          analysisChat.threads = [data.thread, ...analysisChat.threads.filter((thread) => thread.id !== data.thread.id)];
          activeAnalysisThreadId = data.thread.id;
          renderAnalysisChat();
          analysisChatQuestion.focus();
          return data.thread;
        } catch (error) {
          showToast(formatRequestError(error, "새 질문을 만들지 못했습니다."), true);
          return null;
        } finally {
          analysisChatNewButton.disabled = false;
        }
      }

      function renderAnalysisChat() {
        renderAnalysisChatTabs();
        renderAnalysisChatThread();
      }

      function renderAnalysisChatTabs() {
        if (!analysisChat.threads.length) {
          analysisChatTabs.replaceChildren();
          return;
        }
        analysisChatTabs.replaceChildren(
          ...analysisChat.threads.map((thread) => {
            const button = document.createElement("button");
            button.type = "button";
            button.className = `analysis-chat-tab${thread.id === activeAnalysisThreadId ? " is-active" : ""}`;
            button.title = thread.title || "새 질문";
            button.addEventListener("click", () => {
              activeAnalysisThreadId = thread.id;
              renderAnalysisChat();
              analysisChatQuestion.focus();
            });
            const label = document.createElement("span");
            label.className = "analysis-chat-tab-label";
            label.textContent = thread.title || "새 질문";
            button.append(label);
            if (thread.id === activeAnalysisThreadId) {
              const deleteButton = document.createElement("span");
              deleteButton.className = "analysis-chat-tab-delete";
              deleteButton.textContent = "×";
              deleteButton.title = "질문 삭제";
              deleteButton.addEventListener("click", (event) => {
                event.preventDefault();
                event.stopPropagation();
                deleteAnalysisChatThread(thread);
              });
              button.append(deleteButton);
            }
            return button;
          }),
        );
        alignActiveAnalysisChatTab();
      }

      function alignActiveAnalysisChatTab() {
        const activeTab = analysisChatTabs.querySelector(".analysis-chat-tab.is-active");
        if (!activeTab) {
          analysisChatTabs.scrollLeft = 0;
          return;
        }
        requestAnimationFrame(() => {
          if (activeTab === analysisChatTabs.firstElementChild) {
            analysisChatTabs.scrollTo({ left: 0, behavior: "auto" });
            return;
          }
          const tabsRect = analysisChatTabs.getBoundingClientRect();
          const activeRect = activeTab.getBoundingClientRect();
          const left = analysisChatTabs.scrollLeft + activeRect.left - tabsRect.left;
          analysisChatTabs.scrollTo({
            left: Math.max(0, left),
            behavior: "auto",
          });
        });
      }

      async function deleteAnalysisChatThread(thread) {
        if (!currentAnalysisFile || !thread?.id) {
          return;
        }
        if (["pending", "running"].includes(thread.status)) {
          showToast("답변 생성 중인 질문은 삭제할 수 없습니다.", true);
          return;
        }
        if (!confirm(`삭제할까요?\n${thread.title || "질문"}`)) {
          return;
        }
        try {
          const response = await fetch(
            `/api/analysis-html/${encodeURIComponent(currentAnalysisFile)}/chats/${thread.id}`,
            { method: "DELETE" },
          );
          await ensureAuthorized(response);
          const data = await response.json();
          if (!response.ok || !data.ok) {
            throw new Error(data.error || "질문 삭제 실패");
          }
          analysisChat.threads = analysisChat.threads.filter((item) => item.id !== thread.id);
          activeAnalysisThreadId = analysisChat.threads[0]?.id || "";
          renderAnalysisChat();
        } catch (error) {
          showToast(formatRequestError(error, "질문 삭제 실패"), true);
        }
      }

      function renderAnalysisChatThread() {
        const thread = getActiveAnalysisThread();
        analysisChatSubmit.disabled = Boolean(thread && ["pending", "running"].includes(thread.status));
        if (!thread) {
          analysisChatThread.replaceChildren();
          return;
        }

        const messages = Array.isArray(thread.messages) ? thread.messages : [];
        const nodes = messages.map((message) => {
          const item = document.createElement("div");
          item.className = `note-message ${message.role === "user" ? "user" : "assistant"}`;
          item.textContent =
            message.status === "failed"
              ? `실패: ${message.error || "답변 생성 실패"}`
              : message.content || getNoteStatusLabel(thread.status);
          return item;
        });
        if (["pending", "running"].includes(thread.status)) {
          const pending = document.createElement("div");
          pending.className = "note-message assistant";
          pending.textContent = getNoteStatusLabel(thread.status);
          nodes.push(pending);
        }
        if (thread.status === "failed" && thread.error) {
          const failed = document.createElement("div");
          failed.className = "note-message assistant";
          failed.textContent = `실패: ${thread.error}`;
          nodes.push(failed);
        }
        analysisChatThread.replaceChildren(...nodes);
        analysisChatThread.scrollTop = analysisChatThread.scrollHeight;
      }

      function getActiveAnalysisThread() {
        return analysisChat.threads.find((thread) => thread.id === activeAnalysisThreadId) || null;
      }

      function getSelectedAnalysisChatModelMode() {
        return analysisChatModelModeInputs.find((input) => input.checked)?.value === "deep" ? "deep" : "fast";
      }

      async function submitAnalysisChatQuestion() {
        if (!currentAnalysisFile) {
          return;
        }
        const question = analysisChatQuestion.value.trim();
        if (!question) {
          analysisChatQuestion.focus();
          return;
        }

        let thread = getActiveAnalysisThread();
        if (!thread) {
          thread = await createAnalysisChatThread();
        }
        if (!thread) {
          return;
        }

        analysisChatSubmit.disabled = true;
        try {
          const response = await fetch(
            `/api/analysis-html/${encodeURIComponent(currentAnalysisFile)}/chats/${thread.id}/messages`,
            {
              method: "POST",
              headers: { "content-type": "application/json" },
              body: JSON.stringify({
                question,
                modelMode: getSelectedAnalysisChatModelMode(),
              }),
            },
          );
          await ensureAuthorized(response);
          const data = await response.json();
          if (!response.ok || !data.ok) {
            throw new Error(data.error || "질문을 보내지 못했습니다.");
          }
          analysisChatQuestion.value = "";
          analysisChat.threads = [data.thread, ...analysisChat.threads.filter((item) => item.id !== data.thread.id)];
          activeAnalysisThreadId = data.thread.id;
          renderAnalysisChat();
          startAnalysisChatPolling();
        } catch (error) {
          showToast(formatRequestError(error, "질문을 보내지 못했습니다."), true);
          analysisChatSubmit.disabled = false;
        }
      }

      function handleAnalysisChatQuestionKeyDown(event) {
        if (!shouldSubmitNoteOnEnter(event) || analysisChatSubmit.disabled) {
          return;
        }
        event.preventDefault();
        submitAnalysisChatQuestion();
      }

      function startAnalysisChatPolling() {
        if (analysisChatPollTimer) {
          return;
        }
        analysisChatPollTimer = window.setInterval(() => {
          if (!analysisChatSheet.hidden && currentAnalysisFile) {
            loadAnalysisChat();
          }
        }, 1800);
      }

      function stopAnalysisChatPolling() {
        if (analysisChatPollTimer) {
          window.clearInterval(analysisChatPollTimer);
          analysisChatPollTimer = null;
        }
      }

      async function loadChats(options = {}) {
        try {
          const response = await fetch("/api/chats");
          await ensureAuthorized(response);
          const data = await response.json();
          if (!response.ok || !data.ok) {
            throw new Error(data.error || "채팅 히스토리를 불러오지 못했습니다.");
          }
          chats = Array.isArray(data.chats) ? data.chats : [];
          renderChatHistory();
          const targetId = options.chatId || activeChat?.id || chats[0]?.id || "";
          if (targetId) {
            await loadChat(targetId, { preserveActive: true });
          } else {
            activeChat = null;
            renderChat();
          }
        } catch (error) {
          showToast(formatRequestError(error, "채팅 히스토리를 불러오지 못했습니다."), true);
        }
      }

      async function createChat() {
        chatNewButton.disabled = true;
        try {
          const response = await fetch("/api/chats", {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({}),
          });
          await ensureAuthorized(response);
          const data = await response.json();
          if (!response.ok || !data.ok) {
            throw new Error(data.error || "채팅을 만들지 못했습니다.");
          }
          activeChat = data.chat;
          setChatSummary(data.chat, { moveToTop: true });
          renderChatHistory();
          renderChat();
          closeChatHistory();
          chatQuestion.focus();
          history.replaceState({ view: "chat", chatId: data.chat.id }, "", getRouteHash({ view: "chat", chatId: data.chat.id }));
          return data.chat;
        } catch (error) {
          showToast(formatRequestError(error, "채팅을 만들지 못했습니다."), true);
          return null;
        } finally {
          chatNewButton.disabled = false;
        }
      }

      async function loadChat(chatId, options = {}) {
        if (!chatId) {
          activeChat = null;
          renderChat();
          return;
        }
        try {
          const response = await fetch(`/api/chats/${encodeURIComponent(chatId)}`);
          await ensureAuthorized(response);
          const data = await response.json();
          if (!response.ok || !data.ok) {
            throw new Error(data.error || "채팅을 불러오지 못했습니다.");
          }
          activeChat = data.chat;
          setChatSummary(data.chat);
          renderChatHistory();
          renderChat();
          updateOpenChatNoteView();
          if (!options.preserveActive) {
            chatQuestion.focus();
          }
          if (hasPendingChatWork(activeChat)) {
            startChatPolling();
          } else {
            stopChatPolling();
          }
        } catch (error) {
          showToast(formatRequestError(error, "채팅을 불러오지 못했습니다."), true);
        }
      }

      async function deleteChatById(chatId) {
        const chat = chats.find((item) => item.id === chatId) || (activeChat?.id === chatId ? activeChat : null);
        if (!chat?.id) {
          return;
        }
        if (["pending", "running"].includes(chat.status)) {
          showToast("답변 생성 중인 채팅은 삭제할 수 없습니다.", true);
          return;
        }
        const confirmed = await askConfirm({
          title: "삭제할까요?",
          message: chat.title || "채팅",
          okText: "삭제",
          danger: true,
        });
        if (!confirmed) {
          return;
        }
        try {
          const response = await fetch(`/api/chats/${encodeURIComponent(chat.id)}`, { method: "DELETE" });
          await ensureAuthorized(response);
          const data = await response.json();
          if (!response.ok || !data.ok) {
            throw new Error(data.error || "채팅 삭제 실패");
          }
          chats = chats.filter((item) => item.id !== chat.id);
          if (activeChat?.id === chat.id) {
            activeChat = null;
          }
          renderChatHistory();
          renderChat();
          if (!activeChat && chats[0]?.id) {
            await loadChat(chats[0].id);
          }
        } catch (error) {
          showToast(formatRequestError(error, "채팅 삭제 실패"), true);
        }
      }

      function renderChatHistory() {
        if (!chats.length) {
          const empty = document.createElement("div");
          empty.className = "chat-empty";
          empty.textContent = "저장된 채팅 없음";
          chatHistoryList.replaceChildren(empty);
          return;
        }
        chatHistoryList.replaceChildren(
          ...chats.map((chat) => {
            const button = document.createElement("div");
            button.className = `chat-history-item${chat.id === activeChat?.id ? " is-active" : ""}`;
            button.tabIndex = 0;
            button.setAttribute("role", "button");
            const openChatFromHistory = async () => {
              await loadChat(chat.id);
              closeChatHistory();
              history.pushState({ view: "chat", chatId: chat.id }, "", getRouteHash({ view: "chat", chatId: chat.id }));
            };
            button.addEventListener("click", openChatFromHistory);
            button.addEventListener("keydown", (event) => {
              if (event.key === "Enter" || event.key === " ") {
                event.preventDefault();
                openChatFromHistory();
              }
            });
            const openButton = document.createElement("div");
            openButton.className = "chat-history-item-main";

            const title = document.createElement("span");
            title.className = "chat-history-title";
            title.textContent = chat.title || "새 채팅";
            const meta = document.createElement("span");
            meta.className = "chat-history-meta";
            meta.textContent = formatChatTimestamp(chat.updatedAt || chat.createdAt);
            const deleteButton = document.createElement("button");
            deleteButton.type = "button";
            deleteButton.className = "chat-history-delete";
            deleteButton.title = "삭제";
            deleteButton.setAttribute("aria-label", "삭제");
            deleteButton.innerHTML = `
              <svg class="toolbar-icon" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M3 6h18" />
                <path d="M8 6V4h8v2" />
                <path d="M6 6l1 15h10l1-15" />
                <path d="M10 11v6" />
                <path d="M14 11v6" />
              </svg>
            `;
            deleteButton.addEventListener("click", (event) => {
              event.preventDefault();
              event.stopPropagation();
              deleteChatById(chat.id);
            });
            openButton.append(title, meta);
            button.append(openButton, deleteButton);
            return button;
          }),
        );
      }

      function toggleChatHistory() {
        if (isDesktopTypingShortcut()) {
          closeChatHistory();
          document.body.classList.toggle("is-chat-history-collapsed");
          return;
        }
        document.body.classList.remove("is-chat-history-collapsed");
        if (document.body.classList.contains("is-chat-history-open")) {
          closeChatHistory();
        } else {
          openChatHistory();
        }
      }

      function openChatHistory() {
        document.body.classList.remove("is-chat-history-collapsed");
        document.body.classList.add("is-chat-history-open");
        chatHistoryBackdrop.hidden = false;
      }

      function closeChatHistory() {
        document.body.classList.remove("is-chat-history-open");
        chatHistoryBackdrop.hidden = true;
      }

      function renderChat() {
        chatTitle.textContent = activeChat?.title || "새 채팅";
        chatMeta.textContent = activeChat ? formatChatTimestamp(activeChat.updatedAt || activeChat.createdAt) : "";
        chatSubmit.disabled = Boolean(activeChat && ["pending", "running"].includes(activeChat.status));

        const messages = Array.isArray(activeChat?.messages) ? activeChat.messages : [];
        const notesByMessage = groupChatMessageNotes(activeChat?.messageNotes || []);
        if (!messages.length) {
          const empty = document.createElement("div");
          empty.className = "chat-empty";
          empty.textContent = "질문을 입력하면 여기에 대화가 저장됩니다.";
          chatThread.replaceChildren(empty);
          return;
        }

        const nodes = messages.map((message) => {
          const messageNotes = notesByMessage.get(message.id) || [];
          const hasPending = messageNotes.some((note) => ["pending", "running"].includes(note.status));
          const item = document.createElement("div");
          item.className = `chat-message ${message.role === "user" ? "user" : "assistant"}`;
          item.classList.toggle("has-subnote", messageNotes.length > 0);
          item.classList.toggle("is-pending-subnote", hasPending);
          item.tabIndex = 0;
          item.title = "이 말풍선에 대해 질문";
          item.addEventListener("click", () => openChatMessageNote(message, messageNotes));
          item.addEventListener("keydown", (event) => {
            if (event.key === "Enter" || event.key === " ") {
              event.preventDefault();
              openChatMessageNote(message, messageNotes);
            }
          });
          const content = document.createElement("div");
          content.className = "chat-message-content";
          content.textContent =
            message.status === "failed"
              ? `실패: ${message.error || "답변 생성 실패"}`
              : message.content || getNoteStatusLabel(activeChat.status);
          item.append(content);
          return item;
        });
        if (["pending", "running"].includes(activeChat?.status)) {
          const pending = document.createElement("div");
          pending.className = "chat-message assistant";
          pending.textContent = getNoteStatusLabel(activeChat.status);
          nodes.push(pending);
        }
        chatThread.replaceChildren(...nodes);
        chatThread.scrollTop = chatThread.scrollHeight;
      }

      function groupChatMessageNotes(notes) {
        const map = new Map();
        (Array.isArray(notes) ? notes : []).forEach((note) => {
          if (!note.parentMessageId) {
            return;
          }
          const current = map.get(note.parentMessageId) || [];
          current.push(note);
          map.set(note.parentMessageId, current);
        });
        return map;
      }

      function openChatMessageNote(message, messageNotes) {
        const latest = [...(messageNotes || [])].sort((a, b) => Date.parse(b.updatedAt) - Date.parse(a.updatedAt))[0];
        if (latest) {
          openChatNoteView(message, latest);
          return;
        }
        openChatAskSheet(message);
      }

      async function submitChatQuestion() {
        const question = chatQuestion.value.trim();
        if (!question) {
          chatQuestion.focus();
          return;
        }
        const providers = getSelectedChatProviders();
        if (!providers.length) {
          showToast("하나 이상의 LLM을 선택하세요.", true);
          return;
        }

        let chat = activeChat;
        if (!chat) {
          chat = await createChat();
        }
        if (!chat) {
          return;
        }

        chatSubmit.disabled = true;
        try {
          const response = await fetch(`/api/chats/${encodeURIComponent(chat.id)}/messages`, {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({
              question,
              providers,
              thinkLevel: getSelectedChatThinkLevel(),
            }),
          });
          await ensureAuthorized(response);
          const data = await response.json();
          if (!response.ok || !data.ok) {
            throw new Error(data.error || "질문을 보내지 못했습니다.");
          }
          chatQuestion.value = "";
          activeChat = data.chat;
          setChatSummary(data.chat, { moveToTop: true });
          renderChatHistory();
          renderChat();
          startChatPolling();
          history.replaceState({ view: "chat", chatId: data.chat.id }, "", getRouteHash({ view: "chat", chatId: data.chat.id }));
        } catch (error) {
          showToast(formatRequestError(error, "질문을 보내지 못했습니다."), true);
          chatSubmit.disabled = false;
        }
      }

      function handleChatQuestionKeyDown(event) {
        if (!shouldSubmitNoteOnEnter(event) || chatSubmit.disabled) {
          return;
        }
        event.preventDefault();
        submitChatQuestion();
      }

      function openChatAskSheet(message) {
        if (!activeChat?.id || !message?.id || !message.content) {
          return;
        }
        if (!chatAskSheet.hidden && activeChatAskMessageId === message.id) {
          closeChatAskSheet();
          return;
        }
        closeChatNoteView();
        activeChatAskMessageId = message.id;
        chatAskQuestion.value = "";
        chatAskQuestion.readOnly = false;
        chatAskSubmit.hidden = false;
        chatAskSubmit.disabled = false;
        setChatAskModelMode("fast");
        chatAskSelection.textContent = formatNoteSelectionPreview(message.content);
        chatAskSelection.title = message.content;
        chatAskSheet.hidden = false;
        chatAskQuestion.focus();
      }

      function closeChatAskSheet() {
        chatAskSheet.hidden = true;
        activeChatAskMessageId = "";
        chatAskQuestion.value = "";
        chatAskQuestion.readOnly = false;
        chatAskSubmit.hidden = false;
        chatAskSubmit.disabled = false;
      }

      function setChatAskModelMode(modelMode) {
        chatAskModelModeInputs.forEach((input) => {
          input.checked = input.value === modelMode;
        });
      }

      function getSelectedChatAskModelMode() {
        return chatAskModelModeInputs.find((input) => input.checked)?.value === "deep" ? "deep" : "fast";
      }

      function openChatNoteView(message, note, options = {}) {
        if (!activeChat?.id || !message?.id || !note?.id) {
          return;
        }
        if (!options.refresh && !chatNoteViewSheet.hidden && activeChatNoteId === note.id) {
          closeChatNoteView();
          return;
        }
        const replyDraft = chatNoteReplyQuestion.value;
        closeChatAskSheet();
        activeChatNoteId = note.id;
        chatNoteViewQuestion.textContent = note.modelMode ? `${note.modelMode} · ${note.model || ""}` : "";
        renderChatNoteThread(note);
        chatNoteReplyQuestion.value = options.refresh ? replyDraft : "";
        if (!options.refresh) {
          setChatNoteReplyModelMode("fast");
        }
        chatNoteReplySubmit.disabled = ["pending", "running"].includes(note.status);
        chatNoteDeleteButton.disabled = false;
        chatNoteViewSelection.textContent = formatNoteSelectionPreview(message.content);
        chatNoteViewSelection.title = message.content;
        chatNoteViewSheet.hidden = false;
        if (!options.refresh) {
          window.requestAnimationFrame(() => {
            chatNoteReplyQuestion.focus();
          });
        }
      }

      function closeChatNoteView() {
        activeChatNoteId = "";
        chatNoteViewSheet.hidden = true;
        chatNoteReplyQuestion.value = "";
        chatNoteReplySubmit.disabled = false;
      }

      function renderChatNoteThread(note) {
        const messages = Array.isArray(note.messages) && note.messages.length
          ? note.messages
          : getFallbackNoteMessages(note);
        chatNoteViewThread.replaceChildren(
          ...messages.map((message) => {
            const item = document.createElement("div");
            item.className = `note-message ${message.role === "user" ? "user" : "assistant"}`;
            item.textContent =
              message.status === "failed"
                ? `실패: ${message.error || "답변 생성 실패"}`
                : message.content || getNoteStatusLabel(note.status);
            return item;
          }),
        );
        if (["pending", "running"].includes(note.status)) {
          const pending = document.createElement("div");
          pending.className = "note-message assistant";
          pending.textContent = getNoteStatusLabel(note.status);
          chatNoteViewThread.append(pending);
        }
        chatNoteViewThread.scrollTop = chatNoteViewThread.scrollHeight;
      }

      function getSelectedChatNoteReplyModelMode() {
        return chatNoteReplyModelModeInputs.find((input) => input.checked)?.value === "deep" ? "deep" : "fast";
      }

      function setChatNoteReplyModelMode(mode) {
        chatNoteReplyModelModeInputs.forEach((input) => {
          input.checked = input.value === mode;
        });
      }

      async function submitChatMessageQuestion() {
        if (!activeChat?.id || !activeChatAskMessageId) {
          return;
        }
        const question = chatAskQuestion.value.trim();
        if (!question) {
          chatAskQuestion.focus();
          return;
        }

        chatAskSubmit.disabled = true;
        try {
          const response = await fetch(
            `/api/chats/${encodeURIComponent(activeChat.id)}/messages/${encodeURIComponent(activeChatAskMessageId)}/ask`,
            {
              method: "POST",
              headers: { "content-type": "application/json" },
              body: JSON.stringify({
                question,
                modelMode: getSelectedChatAskModelMode(),
              }),
            },
          );
          await ensureAuthorized(response);
          const data = await response.json();
          if (!response.ok || !data.ok) {
            throw new Error(data.error || "질문을 보내지 못했습니다.");
          }
          closeChatAskSheet();
          activeChat = data.chat;
          setChatSummary(data.chat);
          renderChatHistory();
          renderChat();
          updateOpenChatNoteView();
          startChatPolling();
        } catch (error) {
          showToast(formatRequestError(error, "질문을 보내지 못했습니다."), true);
        } finally {
          chatAskSubmit.disabled = false;
        }
      }

      function handleChatAskQuestionKeyDown(event) {
        if (!shouldSubmitNoteOnEnter(event) || chatAskSubmit.disabled) {
          return;
        }
        event.preventDefault();
        submitChatMessageQuestion();
      }

      async function submitChatNoteReply() {
        if (!activeChat?.id || !activeChatNoteId) {
          return;
        }
        const question = chatNoteReplyQuestion.value.trim();
        if (!question) {
          chatNoteReplyQuestion.focus();
          return;
        }

        chatNoteReplySubmit.disabled = true;
        try {
          const response = await fetch(
            `/api/chats/${encodeURIComponent(activeChat.id)}/message-notes/${encodeURIComponent(activeChatNoteId)}/messages`,
            {
              method: "POST",
              headers: { "content-type": "application/json" },
              body: JSON.stringify({
                question,
                modelMode: getSelectedChatNoteReplyModelMode(),
              }),
            },
          );

          const data = await response.json();
          if (!response.ok || !data.ok) {
            throw new Error(data.error || "후속 질문을 보내지 못했습니다.");
          }
          chatNoteReplyQuestion.value = "";
          activeChat = data.chat;
          setChatSummary(data.chat);
          renderChatHistory();
          renderChat();
          updateOpenChatNoteView();
          startChatPolling();
        } catch (error) {
          showToast(formatRequestError(error, "후속 질문을 보내지 못했습니다."), true);
          chatNoteReplySubmit.disabled = false;
        }
      }

      function handleChatNoteReplyKeyDown(event) {
        if (!shouldSubmitNoteOnEnter(event) || chatNoteReplySubmit.disabled) {
          return;
        }
        event.preventDefault();
        submitChatNoteReply();
      }

      async function deleteActiveChatNote() {
        if (!activeChat?.id || !activeChatNoteId) {
          return;
        }
        chatNoteDeleteButton.disabled = true;
        try {
          const response = await fetch(
            `/api/chats/${encodeURIComponent(activeChat.id)}/message-notes/${encodeURIComponent(activeChatNoteId)}`,
            { method: "DELETE" },
          );
          await ensureAuthorized(response);
          const data = await response.json();
          if (!response.ok || !data.ok) {
            throw new Error(data.error || "서브 질문 삭제 실패");
          }
          closeChatNoteView();
          activeChat = data.chat;
          setChatSummary(data.chat);
          renderChatHistory();
          renderChat();
        } catch (error) {
          showToast(formatRequestError(error, "서브 질문 삭제 실패"), true);
        } finally {
          chatNoteDeleteButton.disabled = false;
        }
      }

      function updateOpenChatNoteView() {
        if (chatNoteViewSheet.hidden || !activeChatNoteId) {
          return;
        }
        const note = (activeChat?.messageNotes || []).find((item) => item.id === activeChatNoteId);
        const message = note
          ? (activeChat?.messages || []).find((item) => item.id === note.parentMessageId)
          : null;
        if (note && message) {
          openChatNoteView(message, note, { refresh: true });
        } else {
          closeChatNoteView();
        }
      }

      function getSelectedChatProviders() {
        return chatProviderInputs.filter((input) => input.checked).map((input) => input.value);
      }

      function getSelectedChatThinkLevel() {
        return Number(chatThinkLevelInputs.find((input) => input.checked)?.value || 1);
      }

      function createChatSummary(chat) {
        return {
          id: chat.id,
          title: chat.title,
          status: chat.status,
          messageCount: Array.isArray(chat.messages) ? chat.messages.length : 0,
          providers: chat.providers || [],
          thinkLevel: chat.thinkLevel || 1,
          createdAt: chat.createdAt,
          updatedAt: chat.updatedAt,
        };
      }

      function setChatSummary(chat, options = {}) {
        const summary = createChatSummary(chat);
        const existingIndex = chats.findIndex((item) => item.id === summary.id);
        const nextChats = chats.filter((item) => item.id !== summary.id);
        if (options.moveToTop || existingIndex === -1) {
          chats = [summary, ...nextChats];
          return;
        }
        nextChats.splice(existingIndex, 0, summary);
        chats = nextChats;
      }

      function getProviderLabel(providers) {
        const labels = {
          anthropic: "Claude",
          openai: "Codex",
          grok: "Grok",
        };
        const selected = Array.isArray(providers) ? providers : [];
        return selected.map((provider) => labels[provider] || provider).join(", ") || "LLM 없음";
      }

      function getThinkLevelLabel(value) {
        return {
          1: "high",
          2: "xhigh",
          3: "max",
        }[Number(value || 1)] || "high";
      }

      function formatChatTimestamp(value) {
        const date = new Date(value || Date.now());
        if (Number.isNaN(date.getTime())) {
          return "";
        }
        const pad = (number) => String(number).padStart(2, "0");
        return `${date.getMonth() + 1}/${date.getDate()} ${pad(date.getHours())}:${pad(date.getMinutes())}`;
      }

      function hasPendingChatWork(chat) {
        return Boolean(
          ["pending", "running"].includes(chat?.status) ||
            (chat?.messageNotes || []).some((note) => ["pending", "running"].includes(note.status)),
        );
      }

      function startChatPolling() {
        if (chatPollTimer) {
          return;
        }
        chatPollTimer = window.setInterval(() => {
          if (currentView === "chat" && activeChat?.id) {
            loadChat(activeChat.id, { preserveActive: true });
          }
        }, 1200);
      }

      function stopChatPolling() {
        if (chatPollTimer) {
          window.clearInterval(chatPollTimer);
          chatPollTimer = null;
        }
      }

      function createDocumentProgress(doc) {
        if (!["queued", "running"].includes(doc.analysisStatus)) {
          return null;
        }

        const progress = normalizeProgress(doc.analysisProgress);
        const wrap = document.createElement("span");
        wrap.className = "progress-wrap";

        const track = document.createElement("span");
        track.className = "progress-track";
        track.setAttribute("role", "progressbar");
        track.setAttribute("aria-label", "번역 진행률");
        track.setAttribute("aria-valuemin", "0");
        track.setAttribute("aria-valuemax", "100");
        track.setAttribute("aria-valuenow", String(progress.percent));

        const fill = document.createElement("span");
