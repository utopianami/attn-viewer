        fill.className = "progress-fill";
        fill.style.setProperty("--progress", `${progress.percent}%`);
        fill.style.width = `${progress.percent}%`;

        const label = document.createElement("span");
        label.className = "progress-label";
        label.textContent = getProgressLabel(progress);

        track.append(fill);
        wrap.append(track, label);
        return wrap;
      }

      function beginTitleEdit() {
        if (!currentDocument?.id || isShareView) {
          return;
        }
        titleEditInput.value = currentDocument.originalName || "";
        documentTitleRow.hidden = true;
        titleEditForm.hidden = false;
        titleEditInput.focus();
        titleEditInput.select();
      }

      function cancelTitleEdit() {
        if (!titleEditForm || !documentTitleRow) {
          return;
        }
        titleEditForm.hidden = true;
        documentTitleRow.hidden = false;
        titleSaveButton.disabled = false;
      }

      async function saveDocumentTitle(event) {
        event.preventDefault();
        if (!currentDocument?.id || isShareView) {
          return;
        }

        const originalName = titleEditInput.value.replace(/\s+/g, " ").trim();
        if (!originalName) {
          showToast("제목을 입력하세요.", true);
          return;
        }

        titleSaveButton.disabled = true;
        try {
          const response = await fetch(`/api/documents/${currentDocument.id}`, {
            method: "PATCH",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({ originalName }),
          });
          await ensureAuthorized(response);
          const data = await response.json();
          if (!response.ok || !data.ok) {
            throw new Error(data.error || "제목 수정 실패");
          }

          const previousNotes = currentDocument.notes || [];
          currentDocument = { ...data.document, notes: previousNotes };
          documentTitle.textContent = currentDocument.originalName;
          documents = documents.map((doc) =>
            doc.id === currentDocument.id ? { ...doc, originalName: currentDocument.originalName } : doc,
          );
          renderDocumentList();
          cancelTitleEdit();
          showToast("제목 수정됨");
        } catch (error) {
          showToast(formatRequestError(error, "제목 수정 실패"), true);
        } finally {
          titleSaveButton.disabled = false;
        }
      }

      async function deleteDocument(doc) {
        const name = doc.originalName || "이 글";
        if (!confirm(`삭제할까요?\n${name}`)) {
          return;
        }

        setFeedback("글 삭제 중");
        try {
          const response = await fetch(`/api/documents/${doc.id}`, {
            method: "DELETE",
          });
          await ensureAuthorized(response);
          const data = await response.json();
          if (!response.ok || !data.ok) {
            throw new Error(data.error || "글 삭제 실패");
          }

          documents = documents.filter((item) => item.id !== doc.id);
          if (currentDocument?.id === doc.id) {
            activePollJobId = "";
            currentDocument = null;
            documentSection.classList.remove("is-visible");
            setAnalyzeEnabled(false);
            if (currentView === "reader") {
              navigateTo("home", { replace: true });
            }
          }
          renderDocumentList();
          setFeedback("삭제 완료");
        } catch (error) {
          setFeedback(formatRequestError(error, "글 삭제 실패"), true);
        }
      }

      async function shareCurrentDocument() {
        if (!currentDocument?.id || isShareView) {
          return;
        }

        shareButton.disabled = true;
        setFeedback("공유 링크 생성 중");
        try {
          const response = await fetch(`/api/documents/${currentDocument.id}/shares`, {
            method: "POST",
          });
          await ensureAuthorized(response);
          const data = await response.json();
          if (!response.ok || !data.ok) {
            throw new Error(data.error || "공유 링크 생성 실패");
          }

          const shareUrl = `${location.origin}/${data.share.sharePath}`;
          await copyText(shareUrl);
          setFeedback("공유 링크 복사됨");
          showToast("공유 링크 복사됨");
        } catch (error) {
          setFeedback(formatRequestError(error, "공유 링크 생성 실패"), true);
          showToast(formatRequestError(error, "공유 링크 생성 실패"), true);
        } finally {
          shareButton.disabled = false;
        }
      }

      async function copyText(value) {
        if (navigator.clipboard?.writeText) {
          try {
            await navigator.clipboard.writeText(value);
            return;
          } catch {
            // Fall through to the textarea fallback for browsers that expose the API but deny it.
          }
        }

        const input = document.createElement("textarea");
        input.value = value;
        input.setAttribute("readonly", "");
        input.style.position = "fixed";
        input.style.top = "-1000px";
        document.body.append(input);
        input.select();
        document.execCommand("copy");
        input.remove();
      }

      function showToast(message, isError = false) {
        toast.textContent = message;
        toast.classList.toggle("error", isError);
        toast.hidden = false;
        window.clearTimeout(showToast.timeoutId);
        showToast.timeoutId = window.setTimeout(() => {
          toast.hidden = true;
        }, 2200);
      }

      function askConfirm({ title = "확인", message = "", okText = "확인", danger = false } = {}) {
        return new Promise((resolve) => {
          confirmTitle.textContent = title;
          confirmMessage.textContent = message;
          confirmOk.textContent = okText;
          confirmOk.classList.toggle("confirm-danger", danger);
          confirmBackdrop.hidden = false;

          const cleanup = (value) => {
            confirmBackdrop.hidden = true;
            confirmCancel.removeEventListener("click", onCancel);
            confirmOk.removeEventListener("click", onOk);
            confirmBackdrop.removeEventListener("click", onBackdrop);
            document.removeEventListener("keydown", onKeyDown, true);
            resolve(value);
          };
          const onCancel = () => cleanup(false);
          const onOk = () => cleanup(true);
          const onBackdrop = (event) => {
            if (event.target === confirmBackdrop) {
              cleanup(false);
            }
          };
          const onKeyDown = (event) => {
            if (event.key === "Escape") {
              event.preventDefault();
              cleanup(false);
            }
          };

          confirmCancel.addEventListener("click", onCancel);
          confirmOk.addEventListener("click", onOk);
          confirmBackdrop.addEventListener("click", onBackdrop);
          document.addEventListener("keydown", onKeyDown, true);
          window.requestAnimationFrame(() => {
            confirmCancel.focus();
          });
        });
      }

      async function analyzeCurrentDocument() {
        if (!currentDocument?.id) {
          return;
        }

        setAnalyzeEnabled(false);
        setStatus("Codex");
        setFeedback("번역 작업 시작 중");

        try {
          const response = await fetch(`/api/documents/${currentDocument.id}/analyze`, {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({ pages: 0 }),
          });
          await ensureAuthorized(response);
          const data = await response.json();

          if (!response.ok || !data.ok) {
            throw new Error(data.error || "번역 작업 시작 실패");
          }

          renderAnalysisProgress(data.job);
          updateDocumentProgress(data.job);
          setFeedback("번역 생성 중");
          await watchAnalysisJob(data.job.id);
        } catch (error) {
          setStatus("Error");
          setFeedback(formatRequestError(error, "번역 생성 실패"), true);
        } finally {
          setAnalyzeEnabled(canAnalyzeDocument(currentDocument));
        }
      }

      async function watchAnalysisJob(jobId) {
        activePollJobId = jobId;
        const job = await pollAnalysisJob(jobId);
        if (!job) {
          return null;
        }
        if (activePollJobId !== jobId) {
          return job;
        }
        await loadDocumentList();
        if (currentDocument?.id !== job.documentId) {
          return job;
        }

        currentDocument = {
          ...currentDocument,
          analysis: job.analysis,
          analysisStatus: "succeeded",
          analysisProgress: job.progress,
          activeAnalysisJobId: "",
        };
        renderSummary(job.analysis);
        renderReadingFlow(currentDocument.markdown || "", currentDocument.assets?.charts || [], job.analysis);
        setStatus("Done");
        setFeedback("Codex 번역 생성 완료");
        return job;
      }

      async function pollAnalysisJob(jobId) {
        const startedAt = Date.now();
        const timeoutMs = 15 * 60 * 1000;

        while (Date.now() - startedAt < timeoutMs) {
          await delay(1800);
          if (activePollJobId !== jobId) {
            return null;
          }
          const response = await fetch(`/api/analysis-jobs/${jobId}`);
          await ensureAuthorized(response);
          const data = await response.json();

          if (!response.ok || !data.ok) {
            throw new Error(data.error || "번역 작업 상태 확인 실패");
          }

          if (data.job.status === "succeeded") {
            return data.job;
          }

          if (data.job.status === "failed") {
            throw new Error(data.job.error || "번역 생성 실패");
          }

          updateDocumentProgress(data.job);
          if (currentDocument?.id === data.job.documentId && activePollJobId === jobId) {
            renderAnalysisProgress(data.job);
            setFeedback(getJobProgressText(data.job));
          }
        }

        throw new Error("번역 생성 시간이 초과되었습니다. 잠시 후 글 목록에서 다시 확인하세요.");
      }

      function delay(ms) {
        return new Promise((resolve) => setTimeout(resolve, ms));
      }

      function renderSummary(analysis) {
        if (!analysis) {
          summaryEmpty.textContent =
            "업로드가 완료되면 글 올리기 영역의 번역 생성을 눌러 전체요약과 문단 요약을 만들 수 있습니다.";
          summaryEmpty.hidden = false;
          hideAnalysisProgress();
          setSummaryDetailsVisible(false);
          summaryText.replaceChildren();
          summaryList.replaceChildren();
          analysisMeta.textContent = "";
          analysisMeta.hidden = true;
          resetSummaryPanelScroll();
          teardownSummaryScrollSpy();
          return;
        }

        hideAnalysisProgress();
        summaryEmpty.textContent = "";
        summaryEmpty.hidden = true;
        renderOverallSummaryText(analysis.overall?.summary || "");
        const overallBullets = (analysis.overall?.bullets || []).filter((item) =>
          isContentBearingSummary(item),
        );
        summaryText.append(...overallBullets.map(createOverallSummaryListBlock));
        const paragraphSummaries = collectAnalysisSummaries(analysis);
        summaryList.replaceChildren(...paragraphSummaries.map(createLinkedSummaryListItem));
        setSummaryDetailsVisible(true, { hasParagraphs: paragraphSummaries.length > 0 });
        analysisMeta.textContent = "";
        analysisMeta.hidden = true;
        resetSummaryPanelScroll();
      }

      function setSummaryDetailsVisible(isVisible, options = {}) {
        overallSummaryDetails.hidden = !isVisible;
        paragraphSummaryDetails.hidden = !isVisible || !options.hasParagraphs;
        overallSummaryDetails.open = false;
        paragraphSummaryDetails.open = false;
      }

      function collectAnalysisSummaries(analysis) {
        return (analysis?.pages || []).flatMap((page, pageIndex) => {
          const pageNumber = Number(page.page || pageIndex + 1);
          if (Array.isArray(page.sections)) {
            return page.sections
              .map((section, sectionIndex) => ({
                key: getSectionSummaryKey(pageNumber, sectionIndex + 1),
                text: section.summary,
              }))
              .filter((item) => isContentBearingSummary(item.text))
              .filter((item) => String(item.text || "").trim());
          }

          return (page.paragraphs || [])
            .map((paragraph, paragraphIndex) => ({
              key: getParagraphSummaryKey(pageNumber, paragraphIndex + 1),
              text: paragraph.summary,
            }))
            .filter((item) => isContentBearingSummary(item.text))
            .filter((item) => String(item.text || "").trim());
        });
      }

      function renderOverallSummaryText(text) {
        const paragraphs = splitSummaryParagraphs(text);
        if (!paragraphs.length) {
          summaryText.textContent = "";
          return;
        }
        summaryText.replaceChildren(
          ...paragraphs.map((paragraph, index) =>
            createOverallSummaryTarget(paragraph, {
              tagName: "span",
              index,
              total: paragraphs.length,
            }),
          ),
        );
      }

      function splitSummaryParagraphs(text) {
        return String(text || "")
          .split(/\n{1,}/)
          .map((part) => part.replace(/\s+/g, " ").trim())
          .filter(Boolean);
      }

      function createOverallSummaryTarget(text, options = {}) {
        const element = document.createElement(options.tagName || "li");
        element.className = "overall-note-target note-click-target";
        element.textContent = text;
        element.dataset.noteTarget = "overall";
        element.dataset.page = "1";
        element.dataset.anchorText = text;
        element.dataset.contextParagraph = getOverallSummaryContext();
        element.dataset.contextBefore = getOverallSummaryNeighbor(options.index - 1);
        element.dataset.contextAfter = getOverallSummaryNeighbor(options.index + 1);
        applyNoteTargetState(element, 1, text);
        return element;
      }

      function getOverallSummaryContext() {
        return [
          String(currentDocument?.analysis?.overall?.summary || ""),
          ...(currentDocument?.analysis?.overall?.bullets || []),
        ]
          .map((item) => String(item || "").replace(/\s+/g, " ").trim())
          .filter(Boolean)
          .join("\n");
      }

      function getOverallSummaryNeighbor(index) {
        const parts = [
          ...splitSummaryParagraphs(currentDocument?.analysis?.overall?.summary || ""),
          ...(currentDocument?.analysis?.overall?.bullets || []),
        ]
          .map((item) => String(item || "").replace(/\s+/g, " ").trim())
          .filter(Boolean);
        return parts[index] || "";
      }

      function createOverallSummaryListBlock(text, index) {
        const block = createOverallSummaryTarget(text, {
          tagName: "div",
          index: splitSummaryParagraphs(currentDocument?.analysis?.overall?.summary || "").length + index,
        });
        block.classList.add("summary-bullet-block");
        block.textContent = `• ${text}`;
        return block;
      }

      function createLinkedSummaryListItem(item) {
        const li = document.createElement("li");
        li.className = "summary-item";
        li.dataset.summaryKey = item.key;

        const button = document.createElement("button");
        button.type = "button";
        button.className = "summary-link";
        button.textContent = item.text;
        button.addEventListener("click", () => scrollToSummaryTarget(item.key));

        li.append(button);
        return li;
      }

      function resetSummaryPanelScroll() {
        summaryPanel.scrollTop = 0;
        summaryText.scrollTop = 0;
        summaryList.scrollTop = 0;
      }

      function renderAnalysisProgress(job) {
        if (job?.documentId && currentDocument?.id && job.documentId !== currentDocument.id) {
          return;
        }
        teardownSummaryScrollSpy();
        resetSummaryPanelScroll();
        const progress = normalizeProgress(job?.progress);
        summaryEmpty.textContent = "번역이 백그라운드에서 진행 중입니다. 완료되면 전체요약과 문단 요약이 붙습니다.";
        summaryEmpty.hidden = false;
        setSummaryDetailsVisible(false);
        summaryText.replaceChildren();
        analysisProgress.hidden = false;
        analysisProgressFill.style.setProperty("--progress", `${progress.percent}%`);
        analysisProgress.querySelector(".progress-track").setAttribute("aria-valuenow", String(progress.percent));
        analysisProgressLabel.textContent = getProgressLabel(progress);
        summaryList.replaceChildren();
        analysisMeta.textContent = "";
        analysisMeta.hidden = true;
      }

      function getJobProgressText(job) {
        const progress = normalizeProgress(job?.progress);
        const message = progress.message || (job?.status === "queued" ? "번역 대기 중" : "번역 생성 중");
        return `${message} · ${progress.percent}%`;
      }

      function hideAnalysisProgress() {
        analysisProgress.hidden = true;
        analysisProgressFill.style.setProperty("--progress", "0%");
        analysisProgress.querySelector(".progress-track").setAttribute("aria-valuenow", "0");
        analysisProgressLabel.textContent = "";
      }

      function getSectionSummaryKey(pageNumber, sectionNumber) {
        return `p${pageNumber}-s${sectionNumber}`;
      }

      function getParagraphSummaryKey(pageNumber, paragraphNumber) {
        return `p${pageNumber}-p${paragraphNumber}`;
      }

      function getSummarySelector(key) {
        const escaped = String(key).replace(/\\/g, "\\\\").replace(/"/g, '\\"');
        return `[data-summary-key="${escaped}"]`;
      }

      function scrollToSummaryTarget(key) {
        const target = reader.querySelector(getSummarySelector(key));
        if (!target) {
          return;
        }

        setActiveSummaryKey(key, { skipSummaryScroll: true });
        const behavior = window.matchMedia("(prefers-reduced-motion: reduce)").matches
          ? "auto"
          : "smooth";
        target.scrollIntoView({ behavior, block: "start" });
      }

      function setupSummaryScrollSpy(options = {}) {
        teardownSummaryScrollSpy();
        const blocks = Array.from(reader.querySelectorAll("[data-summary-key]"));
        if (!blocks.length) {
          setActiveSummaryKey("");
          return;
        }

        let frameId = 0;
        const update = () => {
          frameId = 0;
          const target = getSummarySpyTarget(blocks);
          if (target?.dataset.summaryKey) {
            setActiveSummaryKey(target.dataset.summaryKey, {
              skipSummaryScroll: Boolean(options.keepPanelAtTop),
            });
            options.keepPanelAtTop = false;
          }
        };
        const scheduleUpdate = () => {
          if (!frameId) {
            frameId = window.requestAnimationFrame(update);
          }
        };

        window.addEventListener("scroll", scheduleUpdate, { passive: true });
        window.addEventListener("resize", scheduleUpdate);
        summaryScrollCleanup = () => {
          window.removeEventListener("scroll", scheduleUpdate);
          window.removeEventListener("resize", scheduleUpdate);
          if (frameId) {
            window.cancelAnimationFrame(frameId);
          }
        };
        update();
      }

      function teardownSummaryScrollSpy() {
        if (summaryScrollCleanup) {
          summaryScrollCleanup();
          summaryScrollCleanup = null;
        }
        setActiveSummaryKey("");
      }

      function getSummarySpyTarget(blocks) {
        const anchorY = window.innerHeight * 0.32;
        let passed = blocks[0] || null;
        let nearest = blocks[0] || null;
        let nearestDistance = Number.POSITIVE_INFINITY;

        for (const block of blocks) {
          const rect = block.getBoundingClientRect();
          if (rect.top <= anchorY && rect.bottom >= anchorY) {
            return block;
          }

          const distance = Math.abs(rect.top - anchorY);
          if (distance < nearestDistance) {
            nearest = block;
            nearestDistance = distance;
          }

          if (rect.top <= anchorY) {
            passed = block;
          }
        }

        return passed || nearest;
      }

      function setActiveSummaryKey(key, options = {}) {
        if (activeSummaryKey === key && !options.force) {
          return;
        }

        activeSummaryKey = key;
        summaryList.querySelectorAll(".summary-item").forEach((item) => {
          item.classList.toggle("is-active", Boolean(key) && item.dataset.summaryKey === key);
        });
        reader.querySelectorAll("[data-summary-key]").forEach((block) => {
          block.classList.toggle("is-active", Boolean(key) && block.dataset.summaryKey === key);
        });

        const activeItem = key
          ? summaryList.querySelector(`.summary-item${getSummarySelector(key)}`)
          : null;
        if (activeItem && !options.skipSummaryScroll && isDesktopReaderLayout()) {
          scrollSummaryItemIntoView(activeItem);
        }
      }

      function scrollSummaryItemIntoView(item) {
        if (!paragraphSummaryDetails.open) {
          return;
        }

        const panelRect = summaryList.getBoundingClientRect();
        const itemRect = item.getBoundingClientRect();
        const topOverflow = itemRect.top - panelRect.top - 8;
        const bottomOverflow = itemRect.bottom - panelRect.bottom + 8;

        if (topOverflow < 0) {
          summaryList.scrollTop += topOverflow;
        } else if (bottomOverflow > 0) {
          summaryList.scrollTop += bottomOverflow;
        }
      }

      function isDesktopReaderLayout() {
        return window.matchMedia("(min-width: 1100px)").matches;
      }

      function appendHighlightedText(element, text, pageNumber) {
        const value = String(text || "");
        const notes = getPageNotes(pageNumber)
          .filter((note) => note.anchorText)
          .map((note) => ({ ...note, index: findNoteMatchIndex(value, note.anchorText) }))
          .filter((note) => note.index >= 0)
          .sort((a, b) => a.index - b.index);

        if (!notes.length) {
          element.textContent = value;
          return [];
        }
        element.textContent = value;
        return notes.map((note) => note.id);
      }

      function findNoteMatchIndex(text, anchorText) {
        const normalizedText = normalizeMatchText(text);
        const normalizedAnchor = normalizeMatchText(anchorText);
        const direct = normalizedText.indexOf(normalizedAnchor);
        if (direct >= 0) {
          return getOriginalIndexForNormalizedText(text, direct);
        }
        if (normalizedAnchor.includes(normalizedText) && normalizedText.length > 24) {
          return 0;
        }
        return -1;
      }

      function normalizeMatchText(value) {
        return String(value || "").replace(/[“”‘’]/g, "").replace(/\s+/g, " ").trim().toLowerCase();
      }

      function getOriginalIndexForNormalizedText(text, normalizedIndex) {
        if (normalizedIndex <= 0) {
          return 0;
        }
        let normalizedCursor = 0;
        for (let index = 0; index < text.length; index += 1) {
          if (/\s/.test(text[index])) {
            if (index > 0 && !/\s/.test(text[index - 1])) {
              normalizedCursor += 1;
            }
          } else {
            normalizedCursor += 1;
          }
          if (normalizedCursor >= normalizedIndex) {
            return index + 1;
          }
        }
        return -1;
      }

      function getPageNotes(pageNumber) {
        if (isShareView || !Array.isArray(currentDocument?.notes)) {
          return [];
        }
        return currentDocument.notes.filter((note) => Number(note.page) === Number(pageNumber));
      }

      function getPageNumberFromSummaryKey(key) {
        const match = String(key || "").match(/^p(\d+)-/);
        return match ? Number(match[1]) : 1;
      }

      async function loadDocumentNotes(documentId) {
        if (isShareView || !documentId) {
          return;
        }
        const response = await fetch(`/api/documents/${documentId}/notes`);
        await ensureAuthorized(response);
        const data = await response.json();
        if (!response.ok || !data.ok) {
          throw new Error(data.error || "메모를 불러오지 못했습니다.");
        }
        applyDocumentNotes(data.notes || []);
      }

      function applyDocumentNotes(notes) {
        if (!currentDocument) {
          return;
        }
        currentDocument.notes = notes;
        renderNoteStatus();
        if (currentDocument.analysis) {
          renderSummary(currentDocument.analysis);
        }
        renderReadingFlow(
          currentDocument.markdown || "",
          currentDocument.assets?.charts || [],
          currentDocument.analysis,
        );
        updateViewedNote();
        startNotesPollingIfNeeded();
      }

      function renderNoteStatus() {
        if (!noteStatus || isShareView) {
          noteStatus?.classList.remove("is-visible");
          return;
        }
        const notes = currentDocument?.notes || [];
        const pendingCount = notes.filter((note) => ["pending", "running"].includes(note.status)).length;
        if (!pendingCount) {
          noteStatus.classList.remove("is-visible");
          noteStatus.textContent = "";
          return;
        }

        noteStatus.textContent = `LLM 메모 답변 생성 중 ${pendingCount}개`;
        noteStatus.classList.add("is-visible");
      }

      function startNotesPollingIfNeeded() {
        stopNotesPolling();
        if (
          isShareView ||
          !currentDocument?.notes?.some((note) => ["pending", "running"].includes(note.status))
        ) {
          return;
        }
        notesPollId = window.setInterval(() => {
          loadDocumentNotes(currentDocument.id).catch(() => {});
        }, 2500);
      }

      function stopNotesPolling() {
        if (notesPollId) {
          window.clearInterval(notesPollId);
          notesPollId = 0;
        }
      }

      function isNoteOverlayElement(target) {
        return Boolean(
          target.closest?.("#noteAskSheet, #noteViewSheet, #analysisChatSheet, #chatAskSheet, #chatNoteViewSheet, #analysisReader .reader-toolbar"),
        );
      }

      function handleOutsideNotePointerDown(event) {
        if (Date.now() < suppressOutsideClickUntil) {
          return;
        }
        if (isNoteOverlayElement(event.target)) {
          return;
        }
        const hadOpen = !noteAskSheet.hidden || !noteViewSheet.hidden || !analysisChatSheet.hidden || !chatAskSheet.hidden || !chatNoteViewSheet.hidden;
        if (!noteAskSheet.hidden) {
          closeAskSheet();
        }
        if (!noteViewSheet.hidden) {
          closeNoteView();
        }
        if (!analysisChatSheet.hidden) {
          closeAnalysisChat();
        }
        if (!chatAskSheet.hidden) {
          closeChatAskSheet();
        }
        if (!chatNoteViewSheet.hidden) {
          closeChatNoteView();
        }
        if (hadOpen) {
          suppressSentenceOpenUntil = Date.now() + 500;
          event.preventDefault();
          event.stopPropagation();
          event.stopImmediatePropagation?.();
        }
      }

      function handleDocumentKeyDown(event) {
        if (event.key !== "Escape") {
          return;
        }
        const hadOpen = !noteAskSheet.hidden || !noteViewSheet.hidden || !chatAskSheet.hidden || !chatNoteViewSheet.hidden;
        if (!hadOpen) {
          return;
        }
        event.preventDefault();
        event.stopPropagation();
        closeOpenNoteUi();
      }

      function closeOpenNoteUi() {
        if (!noteAskSheet.hidden) {
          closeAskSheet();
        }
        if (!noteViewSheet.hidden) {
          closeNoteView();
        }
        if (!chatAskSheet.hidden) {
          closeChatAskSheet();
        }
        if (!chatNoteViewSheet.hidden) {
          closeChatNoteView();
        }
      }

      function getBlockSourceText(block) {
        return Array.from(block.querySelectorAll(".source-sentence"))
          .map((item) => item.textContent.replace(/\s+/g, " ").trim())
          .filter(Boolean)
          .join(" ");
      }

      function getSiblingBlockSourceText(block, direction) {
        let sibling = direction < 0 ? block.previousElementSibling : block.nextElementSibling;
        while (sibling && !sibling.classList.contains("paragraph-block")) {
          sibling = direction < 0 ? sibling.previousElementSibling : sibling.nextElementSibling;
        }
        return sibling ? getBlockSourceText(sibling) : "";
      }

      function getNearestBlockSourceText(element, direction) {
        let sibling = direction < 0
          ? element.closest(".flow-asset, .paragraph-block")?.previousElementSibling
          : element.closest(".flow-asset, .paragraph-block")?.nextElementSibling;
        while (sibling && !sibling.classList.contains("paragraph-block")) {
          sibling = direction < 0 ? sibling.previousElementSibling : sibling.nextElementSibling;
        }
        return sibling ? getBlockSourceText(sibling) : "";
      }

      function getPageSourceText(page) {
        return Array.from(page?.querySelectorAll(".source-sentence") || [])
          .map((item) => item.textContent.replace(/\s+/g, " ").trim())
          .filter(Boolean)
          .slice(0, 20)
          .join(" ");
      }

      function openNoteTargetChat(target) {
        const selection = buildNoteTargetSelection(target);
        if (!selection?.text) {
          return;
        }
        const note = findNoteByAnchor(selection.page, selection.text);
        if (note) {
          openNoteView(note);
          return;
        }
        activeSelection = selection;
        openAskSheet();
      }

      function buildNoteTargetSelection(target) {
        const text = getElementNoteText(target);
        if (!text) {
          return null;
        }
        const page = Number(target.dataset.page || target.closest?.(".flow-page")?.dataset.page || 1);
        const block = target.closest?.(".paragraph-block");
        const flowPage = target.closest?.(".flow-page");
        if (target.dataset.noteTarget === "overall") {
          return {
            text: text.slice(0, 1200),
            page: 1,
            paragraph: target.dataset.contextParagraph || getOverallSummaryContext(),
            contextBefore: target.dataset.contextBefore || "",
            contextAfter: target.dataset.contextAfter || "",
          };
        }
        if (target.dataset.noteTarget === "chart") {
          return {
            text: text.slice(0, 1200),
            page,
            paragraph: target.dataset.contextParagraph || getPageSourceText(flowPage),
            contextBefore: target.dataset.contextBefore || getNearestBlockSourceText(target, -1),
            contextAfter: target.dataset.contextAfter || getNearestBlockSourceText(target, 1),
          };
        }
        return {
          text: text.slice(0, 1200),
          page,
          paragraph: target.dataset.contextParagraph || (block ? getBlockSourceText(block) : ""),
          contextBefore: target.dataset.contextBefore || (block ? getSiblingBlockSourceText(block, -1) : ""),
          contextAfter: target.dataset.contextAfter || (block ? getSiblingBlockSourceText(block, 1) : ""),
        };
      }

      function getElementNoteText(element) {
        return String(element.dataset.anchorText || element.textContent || "").replace(/\s+/g, " ").trim();
      }

      function findNoteByAnchor(page, anchorText) {
        const normalizedAnchor = normalizeMatchText(anchorText);
        return getPageNotes(page).find((note) => normalizeMatchText(note.anchorText) === normalizedAnchor) || null;
      }

      function applyNoteTargetState(element, page, anchorText) {
        const note = findNoteByAnchor(page, anchorText);
        if (!note) {
          element.classList.remove("has-note", "is-pending-note");
          return;
        }
        element.classList.add("has-note");
        element.classList.toggle("is-pending-note", ["pending", "running"].includes(note.status));
      }

      function openAskSheet() {
        if (!activeSelection) {
          return;
        }
        noteQuestion.value = "";
        setNoteModelMode("fast");
        noteAskSheet.hidden = false;
        noteAskSelection.textContent = formatNoteSelectionPreview(activeSelection.text);
        noteAskSelection.title = activeSelection.text;
        noteQuestion.focus();
      }

      function closeAskSheet() {
        noteAskSheet.hidden = true;
        noteQuestion.value = "";
      }

      async function submitNoteQuestion() {
        if (!currentDocument || !activeSelection) {
          return;
        }
        const question = noteQuestion.value.trim();
        if (!question) {
          noteQuestion.focus();
          return;
        }

        noteAskSubmit.disabled = true;
        try {
          const response = await fetch(`/api/documents/${currentDocument.id}/notes/ask`, {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({
              page: activeSelection.page,
              anchorText: activeSelection.text,
              question,
              modelMode: getSelectedNoteModelMode(),
              paragraph: activeSelection.paragraph,
              contextBefore: activeSelection.contextBefore,
              contextAfter: activeSelection.contextAfter,
            }),
          });
          await ensureAuthorized(response);
          const data = await response.json();
          if (!response.ok || !data.ok) {
            throw new Error(data.error || "질문을 보내지 못했습니다.");
          }
          closeAskSheet();
          window.getSelection()?.removeAllRanges();
          applyDocumentNotes([...(currentDocument.notes || []), data.note]);
          showToast("메모 답변 생성 중");
        } catch (error) {
          showToast(formatRequestError(error, "질문을 보내지 못했습니다."), true);
        } finally {
          noteAskSubmit.disabled = false;
        }
      }

      function handleReaderClick(event) {
        if (isShareView) {
          return;
        }
        if (Date.now() < suppressSentenceOpenUntil) {
          event.stopPropagation();
          return;
        }
        const noteTarget = getClickedNoteTarget(event);
        if (noteTarget) {
          event.stopPropagation();
          openNoteTargetChat(noteTarget);
          return;
        }
        const sentence = getClickedSentence(event);
        if (!sentence || window.getSelection()?.toString().trim()) {
          return;
        }

        const note = sentence ? findNoteForClickedSentence(sentence) : null;
        if (note) {
          event.stopPropagation();
          openNoteView(note);
          return;
        }

        const block = sentence.closest?.(".paragraph-block");
        const page = sentence.closest?.(".flow-page");
        if (block && page) {
          event.stopPropagation();
          openSentenceChat(sentence, block, page);
        }
      }

      function handleSummaryPanelClick(event) {
        if (isShareView || window.getSelection()?.toString().trim()) {
          return;
        }
        if (Date.now() < suppressSentenceOpenUntil) {
          event.stopPropagation();
          return;
        }
        const noteTarget = getClickedNoteTarget(event);
        if (!noteTarget) {
          return;
        }
        event.stopPropagation();
        openNoteTargetChat(noteTarget);
      }

      function getClickedNoteTarget(event) {
        const target = event.target.closest?.("[data-note-target]");
        if (!target || target.closest?.("#summaryList .summary-item")) {
          return null;
        }
        return target;
      }

      function getClickedSentence(event) {
        const directSentence = event.target.closest?.(".source-sentence, .translated-sentence");
        if (directSentence) {
          return directSentence;
        }

        const pair = event.target.closest?.(".sentence-pair");
        if (!pair) {
          return null;
        }

        const sentences = Array.from(
          pair.querySelectorAll(".source-sentence, .translated-sentence"),
        );
        if (sentences.length <= 1) {
          return sentences[0] || null;
        }

        return sentences.reduce((nearest, sentence) => {
          const rect = sentence.getBoundingClientRect();
          const centerY = rect.top + rect.height / 2;
          const distance = Math.abs(event.clientY - centerY);
          return distance < nearest.distance ? { sentence, distance } : nearest;
        }, { sentence: sentences[0], distance: Number.POSITIVE_INFINITY }).sentence;
      }

      function openSentenceChat(sentence, block, page) {
        const pageNumber = Number(page.dataset.page || 1);
        const sentenceText = sentence.textContent.replace(/\s+/g, " ").trim();
        const note = findNoteForClickedSentence(sentence);
        if (note) {
          openNoteView(note);
          return;
        }
        activeSelection = {
          text: sentenceText.slice(0, 1200),
          page: pageNumber,
          paragraph: getBlockSourceText(block),
          contextBefore: getSiblingBlockSourceText(block, -1),
          contextAfter: getSiblingBlockSourceText(block, 1),
        };
        openAskSheet();
      }

      function findNoteForClickedSentence(sentence) {
        const pair = sentence.closest?.(".sentence-pair");
        if (pair?.dataset.noteIds) {
          const ids = pair.dataset.noteIds.split(",").filter(Boolean);
          const note = (currentDocument?.notes || []).find((item) => ids.includes(item.id));
          if (note) {
            return note;
          }
        }
        const page = sentence.closest?.(".flow-page");
        if (!page) {
          return null;
        }
        const sentenceText = normalizeMatchText(sentence.textContent);
        const pageNumber = Number(page.dataset.page || 1);
        return getPageNotes(pageNumber).find((note) =>
          sentenceText.includes(normalizeMatchText(note.anchorText)),
        ) || null;
      }

      function applyPairNoteState(pair, noteIds) {
        const uniqueIds = [...new Set(noteIds.filter(Boolean))];
        if (!uniqueIds.length) {
          return;
        }
        pair.dataset.noteIds = uniqueIds.join(",");
        pair.classList.add("has-note");
        const hasPending = (currentDocument?.notes || []).some(
          (note) => uniqueIds.includes(note.id) && ["pending", "running"].includes(note.status),
        );
        pair.classList.toggle("is-pending-note", hasPending);
      }

      function openNoteView(note) {
        activeViewedNoteId = note.id;
        noteViewQuestion.textContent = note.modelMode ? `${note.modelMode} · ${note.model || ""}` : "";
        renderNoteThread(note);
        noteReplyQuestion.value = "";
        setNoteReplyModelMode("fast");
        noteReplySubmit.disabled = ["pending", "running"].includes(note.status);
        noteDeleteButton.hidden = false;
        noteViewSheet.hidden = false;
        noteViewSelection.textContent = formatNoteSelectionPreview(note.anchorText);
        noteViewSelection.title = note.anchorText;
        focusNoteReplyInput();
      }

      function renderNoteThread(note) {
        const messages = Array.isArray(note.messages) && note.messages.length
          ? note.messages
          : getFallbackNoteMessages(note);
        noteViewThread.replaceChildren(
          ...messages.map((message) => {
            const item = document.createElement("div");
            item.className = `note-message ${message.role === "user" ? "user" : "assistant"}`;
            item.textContent =
              message.status === "failed"
                ? `실패: ${message.error || "답변 생성 실패"}`
                : message.content || getNoteStatusLabel(note.status);
            return item;
          }),
        );
        if (["pending", "running"].includes(note.status)) {
          const pending = document.createElement("div");
          pending.className = "note-message assistant";
          pending.textContent = getNoteStatusLabel(note.status);
          noteViewThread.append(pending);
        }
        noteViewThread.scrollTop = noteViewThread.scrollHeight;
      }

      function getFallbackNoteMessages(note) {
        return [
          note.question ? { role: "user", content: note.question } : null,
          note.answer ? { role: "assistant", content: note.answer } : null,
        ].filter(Boolean);
      }

      function formatNoteSelectionPreview(value) {
        const text = String(value || "").replace(/\s+/g, " ").trim();
        const maxLength = window.matchMedia("(max-width: 720px)").matches ? 26 : 30;
        if (text.length <= maxLength) {
          return text;
        }
        return `${text.slice(0, maxLength).trimEnd()}...`;
      }

      function getSelectedNoteModelMode() {
        return noteModelModeInputs.find((input) => input.checked)?.value === "deep" ? "deep" : "fast";
      }

      function setNoteModelMode(mode) {
        noteModelModeInputs.forEach((input) => {
          input.checked = input.value === mode;
        });
      }

      function getSelectedNoteReplyModelMode() {
        return noteReplyModelModeInputs.find((input) => input.checked)?.value === "deep" ? "deep" : "fast";
      }

      function setNoteReplyModelMode(mode) {
        noteReplyModelModeInputs.forEach((input) => {
          input.checked = input.value === mode;
        });
      }

      function handleNoteQuestionKeyDown(event) {
        if (!shouldSubmitNoteOnEnter(event) || noteAskSubmit.disabled) {
          return;
        }
        event.preventDefault();
        submitNoteQuestion();
      }

      function handleNoteReplyKeyDown(event) {
        if (!shouldSubmitNoteOnEnter(event) || noteReplySubmit.disabled) {
          return;
        }
        event.preventDefault();
        submitNoteReply();
      }

      function shouldSubmitNoteOnEnter(event) {
        return (
          event.key === "Enter" &&
          !event.shiftKey &&
          !event.isComposing &&
          isDesktopTypingShortcut()
        );
      }

      function isDesktopTypingShortcut() {
        return window.matchMedia("(min-width: 721px) and (hover: hover) and (pointer: fine)").matches;
      }

      function focusNoteReplyInput() {
        window.requestAnimationFrame(() => {
          noteReplyQuestion.focus();
        });
      }

      async function submitNoteReply() {
        if (!currentDocument || !activeViewedNoteId) {
          return;
        }
        const question = noteReplyQuestion.value.trim();
        if (!question) {
          noteReplyQuestion.focus();
          return;
        }
        noteReplySubmit.disabled = true;
        try {
          const response = await fetch(
            `/api/documents/${currentDocument.id}/notes/${activeViewedNoteId}/messages`,
            {
              method: "POST",
              headers: { "content-type": "application/json" },
              body: JSON.stringify({
                question,
                modelMode: getSelectedNoteReplyModelMode(),
              }),
            },
          );
          await ensureAuthorized(response);
          const data = await response.json();
          if (!response.ok || !data.ok) {
            throw new Error(data.error || "후속 질문을 보내지 못했습니다.");
          }
          noteReplyQuestion.value = "";
          replaceDocumentNote(data.note);
          openNoteView(data.note);
          startNotesPollingIfNeeded();
        } catch (error) {
          showToast(formatRequestError(error, "후속 질문을 보내지 못했습니다."), true);
          noteReplySubmit.disabled = false;
        }
      }

      function replaceDocumentNote(note) {
        currentDocument.notes = (currentDocument.notes || []).map((item) =>
          item.id === note.id ? note : item,
        );
        if (!currentDocument.notes.some((item) => item.id === note.id)) {
          currentDocument.notes.push(note);
        }
        renderNoteStatus();
      }

      function getNoteStatusLabel(status) {
        if (status === "pending") {
          return "답변 대기 중";
        }
        if (status === "running") {
          return "답변 생성 중";
        }
        return "답변 생성 중";
      }

      function updateViewedNote() {
        if (noteViewSheet.hidden || !activeViewedNoteId) {
          return;
        }
        const note = currentDocument?.notes?.find((item) => item.id === activeViewedNoteId);
        if (note) {
          openNoteView(note);
        }
      }

      function closeNoteView() {
        activeViewedNoteId = "";
        noteViewSheet.hidden = true;
      }

      async function deleteViewedNote() {
        if (!currentDocument || !activeViewedNoteId) {
          return;
        }
        noteDeleteButton.disabled = true;
        try {
          const response = await fetch(
            `/api/documents/${currentDocument.id}/notes/${activeViewedNoteId}`,
            { method: "DELETE" },
          );
          await ensureAuthorized(response);
          const data = await response.json();
          if (!response.ok || !data.ok) {
            throw new Error(data.error || "메모 삭제 실패");
          }
          const noteId = activeViewedNoteId;
          closeNoteView();
          applyDocumentNotes((currentDocument.notes || []).filter((note) => note.id !== noteId));
        } catch (error) {
          showToast(formatRequestError(error, "메모 삭제 실패"), true);
        } finally {
          noteDeleteButton.disabled = false;
        }
      }

      function normalizeProgress(progress) {
        const percent = Math.max(0, Math.min(100, Number(progress?.percent || 0)));
        return {
          completed: Math.max(0, Number(progress?.completed || 0)),
          total: Math.max(1, Number(progress?.total || 1)),
          percent,
          message: String(progress?.message || ""),
        };
      }

      function getProgressLabel(progress) {
        const count =
          progress.total > 1 ? ` · ${progress.completed}/${progress.total}` : "";
        return `${progress.percent}%${count}`;
      }

      function updateDocumentProgress(job) {
        documents = documents.map((doc) => {
          if (doc.id !== job.documentId) {
            return doc;
          }
          return {
            ...doc,
            analysisStatus: job.status,
            analysisProgress: job.progress,
            activeAnalysisJobId: job.id,
          };
        });
        if (currentDocument?.id === job.documentId) {
          currentDocument = {
            ...currentDocument,
            analysisStatus: job.status,
            analysisProgress: job.progress,
            activeAnalysisJobId: job.id,
          };
        }
        renderDocumentList();
      }

      function isContentBearingSummary(value) {
        const text = String(value || "").toLowerCase();
        if (!text.trim()) {
          return true;
        }
        const isAdministrative =
          /published by|posted by|written by|about the author|author profile|reply|respond|comment|reaction|like this|share this|sign in|log in|subscribe|unsubscribe|privacy policy|terms of use|terms and conditions|copyright|all rights reserved|not .*advice|for informational purposes only|legal disclaimer|disclaimer|navigation|menu|page header|page footer|view in browser|download app|작성자 소개|저자 소개|프로필|댓글|답글|반응|좋아요|공유|구독|로그인|회원가입|개인정보|처리방침|약관|쿠키|저작권|권리 보유|고지|면책|정보 제공 목적|목차|페이지 상단|페이지 하단|머리말|꼬리말/.test(text);
        const hasAnalyticalSignal =
          /earnings|inflation|rate|yield|credit|equity|macro|fed|fomc|gdp|cpi|valuation|forecast|assumption|scenario|risk|catalyst|evidence|data|금리|인플레이션|물가|성장|경기|유동성|밸류에이션|실적|연준|신용|변동성|가정|전망|시나리오|리스크|근거|데이터|의미|시사/.test(text);
        return !isAdministrative || hasAnalyticalSignal;
      }

      function renderReadingFlow(markdownText, charts, analysis) {
        readingRenderRunId += 1;
        const renderRunId = readingRenderRunId;
        const pageTexts = splitMarkdownPages(markdownText);
        const chartsByPage = groupAssetsByPage(charts);
        const analysisByPage = groupAnalysisByPage(analysis);
        const pageCount = Math.max(pageTexts.length, maxAssetPage(charts));
        const initialPageCount = Math.min(pageCount, 4);
        const batchSize = 4;

        reader.replaceChildren();

        const appendPages = (startIndex, endIndex) => {
          if (renderRunId !== readingRenderRunId) {
            return;
          }
          const fragment = document.createDocumentFragment();
          for (let index = startIndex; index < endIndex; index += 1) {
            const pageNumber = index + 1;
            fragment.append(
              createFlowPage(
                pageNumber,
                pageTexts[index] || "",
                chartsByPage.get(pageNumber) || [],
                analysisByPage.get(pageNumber),
              ),
            );
          }
          reader.append(fragment);
        };

        appendPages(0, initialPageCount);
        setupSummaryScrollSpy({ keepPanelAtTop: true });

        let nextIndex = initialPageCount;
        const scheduleNextBatch = () => {
          if (renderRunId !== readingRenderRunId || nextIndex >= pageCount) {
            setupSummaryScrollSpy({ keepPanelAtTop: true });
            return;
          }
          const renderBatch = () => {
            const endIndex = Math.min(pageCount, nextIndex + batchSize);
            appendPages(nextIndex, endIndex);
            nextIndex = endIndex;
            scheduleNextBatch();
          };
          if ("requestIdleCallback" in window) {
            window.requestIdleCallback(renderBatch, { timeout: 250 });
          } else {
            window.setTimeout(renderBatch, 16);
          }
        };

        scheduleNextBatch();
      }

      function createFlowPage(pageNumber, pageText, charts, pageAnalysis) {
        const section = document.createElement("section");
        section.className = "flow-page";
        section.dataset.page = String(pageNumber);

        const marker = document.createElement("div");
        marker.className = "page-marker";
        marker.textContent = `page ${pageNumber}`;
        section.append(marker);

        const paragraphs = pageText
          .split(/\n{2,}/)
          .map((part) => part.trim())
          .filter(Boolean);
        const hasAnalyzedSections = Array.isArray(pageAnalysis?.sections);
        const unitCount = hasAnalyzedSections ? pageAnalysis.sections.length : paragraphs.length;
        const slots = Array.from({ length: unitCount + 1 }, () => []);

        charts
          .slice()
          .sort(compareAssetsByPosition)
          .forEach((asset) => {
            slots[getAssetInsertionIndex(asset, unitCount)].push(asset);
          });

        if (hasAnalyzedSections) {
          appendAnalyzedSections(section, pageAnalysis.sections, slots, pageNumber);
        } else {
          appendAssetFigures(section, slots[0]);
          paragraphs.forEach((paragraph, index) => {
            section.append(
              createParagraphBlock(
                paragraph,
                pageNumber,
                index + 1,
                pageAnalysis?.paragraphs?.[index],
              ),
            );
            appendAssetFigures(section, slots[index + 1]);
          });
        }

        if (paragraphs.length === 0 && charts.length === 0) {
          const empty = document.createElement("p");
          empty.className = "flow-paragraph";
          empty.textContent = "";
          section.append(empty);
        }

        return section;
      }

      function appendAnalyzedSections(container, sections, slots, pageNumber) {
        appendAssetFigures(container, slots[0]);
        sections.forEach((section, index) => {
          container.append(
            createSemanticSectionBlock(section, getSectionSummaryKey(pageNumber, index + 1)),
          );
          appendAssetFigures(container, slots[index + 1] || []);
        });
      }

      function createSemanticSectionBlock(section, summaryKey) {
        const block = document.createElement("div");
        block.className = "paragraph-block";
        if (section.summary) {
          block.dataset.summaryKey = summaryKey;
        }

        if (section.title) {
          const title = document.createElement("h4");
          title.className = "semantic-title";
          title.textContent = normalizeSectionTitle(section.title);
          block.append(title);
        }

        if (section.summary) {
          const note = document.createElement("div");
          note.className = "paragraph-note note-click-target";
          note.dataset.noteTarget = "semantic-summary";
          note.dataset.page = String(getPageNumberFromSummaryKey(summaryKey));
          note.dataset.anchorText = section.summary;
          applyNoteTargetState(note, getPageNumberFromSummaryKey(summaryKey), section.summary);

          const label = document.createElement("span");
          label.className = "note-label";
          label.textContent = "의미 단위 요약 및 해석";

          const noteText = document.createElement("p");
          noteText.textContent = section.summary;

          note.append(label, noteText);
          block.append(note);
        }

        (section.sentencePairs || []).forEach((sentencePair) => {
          const pair = document.createElement("div");
          pair.className = "sentence-pair";

          const source = document.createElement("p");
          source.className = "source-sentence";
          const noteIds = appendHighlightedText(source, sentencePair.source || "", getPageNumberFromSummaryKey(summaryKey));

          pair.append(source);
          if (sentencePair.translation) {
            const translation = document.createElement("p");
            translation.className = "translated-sentence";
            noteIds.push(
              ...appendHighlightedText(translation, sentencePair.translation, getPageNumberFromSummaryKey(summaryKey)),
            );
            pair.append(translation);
          }
          applyPairNoteState(pair, noteIds);
          block.append(pair);
        });

        return block;
      }

      function createParagraphBlock(paragraph, pageNumber, paragraphNumber, paragraphAnalysis) {
        const block = document.createElement("div");
        block.className = "paragraph-block";

        const summary = shouldShowParagraphNote(paragraph, paragraphNumber)
          ? paragraphAnalysis?.summary || ""
          : "";
        if (summary) {
          block.dataset.summaryKey = getParagraphSummaryKey(pageNumber, paragraphNumber);
          const note = document.createElement("div");
          note.className = "paragraph-note";

          const label = document.createElement("span");
          label.className = "note-label";
          label.textContent = "문단 요약 및 해석";

          const noteText = document.createElement("p");
          noteText.textContent = summary;

          note.append(label, noteText);
          block.append(note);
        }

        splitSentences(paragraph).forEach((sentence, sentenceIndex) => {
          const pair = document.createElement("div");
          pair.className = "sentence-pair";

          const source = document.createElement("p");
          source.className = "source-sentence";
          const noteIds = appendHighlightedText(source, sentence, pageNumber);

          const translatedSentence = paragraphAnalysis?.translations?.[sentenceIndex] || "";
          pair.append(source);
          if (translatedSentence) {
            const translation = document.createElement("p");
            translation.className = "translated-sentence";
            noteIds.push(...appendHighlightedText(translation, translatedSentence, pageNumber));
            pair.append(translation);
          }
          applyPairNoteState(pair, noteIds);
          block.append(pair);
        });

        return block;
      }

      function appendAssetFigures(container, assets) {
        assets.forEach((asset) => {
          const figure = document.createElement("figure");
          figure.className = "flow-asset";

          const link = document.createElement("a");
          link.href = asset.url;
          link.target = "_blank";
          link.rel = "noreferrer";

          const image = document.createElement("img");
          image.src = asset.url;
          image.alt = asset.label || `page ${asset.page}`;
          image.loading = "lazy";
          image.decoding = "async";

          const caption = document.createElement("figcaption");
          caption.textContent = getAssetTitle(asset);

          link.append(image);
          figure.append(link, caption);
          const chartInterpretation = getChartInterpretation(asset);
          if (chartInterpretation) {
            const note = document.createElement("div");
            note.className = "chart-note note-click-target";
            note.dataset.noteTarget = "chart";
            note.dataset.page = String(asset.page || 1);
            note.dataset.anchorText = chartInterpretation;
            note.dataset.contextParagraph = getChartContextText(asset, chartInterpretation);
            applyNoteTargetState(note, Number(asset.page || 1), chartInterpretation);

            const label = document.createElement("span");
            label.className = "note-label";
            label.textContent = "그래프 해석";

            const noteText = document.createElement("p");
            noteText.textContent = chartInterpretation;

            note.append(label, noteText);
            figure.append(note);
          }
          container.append(figure);
        });
      }

      function getChartInterpretation(asset) {
        const pageAnalysis = currentDocument?.analysis?.pages?.find(
          (page) => Number(page.page) === Number(asset.page),
        );
        const chartAnalysis = pageAnalysis?.charts?.find((chart) => chart.file === asset.file);
        return chartAnalysis?.interpretation || "";
      }

      function getChartContextText(asset, interpretation) {
        return [
          getAssetTitle(asset),
          String(asset.label || "").trim(),
          String(interpretation || "").trim(),
        ]
          .filter(Boolean)
          .join("\n");
      }

      function splitSentences(text) {
        const normalized = text.replace(/\s+/g, " ").trim();
        if (!normalized) {
          return [];
        }

        const sentences = normalized.match(/[^.!?。！？]+[.!?。！？]?/g) || [normalized];
        return sentences.map((sentence) => sentence.trim()).filter(Boolean);
      }

      function getAssetTitle(asset) {
        const page = asset.page ? `page ${asset.page}` : "page";
        const position = asset.box?.y0 ? ` · y ${Math.round(asset.box.y0)}` : "";
        return `차트/이미지 · ${page}${position}`;
      }

      function splitMarkdownPages(markdownText) {
        return markdownText.split("\f");
      }

      function groupAssetsByPage(assets) {
        const grouped = new Map();
        assets.forEach((asset) => {
          const page = Number(asset.page || 1);
          if (!grouped.has(page)) {
            grouped.set(page, []);
          }
          grouped.get(page).push(asset);
        });
        return grouped;
      }

      function groupAnalysisByPage(analysis) {
        const grouped = new Map();
        (analysis?.pages || []).forEach((page) => {
          grouped.set(Number(page.page), page);
        });
        return grouped;
      }

      function shouldShowParagraphNote(paragraph, paragraphNumber) {
        const sentences = splitSentences(paragraph);
        const textLength = paragraph.replace(/\s+/g, " ").trim().length;
        if (sentences.length >= 4 || textLength >= 420) {
          return true;
        }
        return paragraphNumber === 1 && textLength >= 220;
      }

      function maxAssetPage(assets) {
        return assets.reduce((max, asset) => Math.max(max, Number(asset.page || 0)), 0);
      }

      function getAssetInsertionIndex(asset, paragraphCount) {
        if (paragraphCount === 0) {
          return 0;
        }

        const pageHeight = Number(asset.pageBox?.height || asset.pageBox?.y1 || 0);
        const y = Number(asset.box?.y0 || 0);
        if (!pageHeight) {
          return Math.min(paragraphCount, 1);
        }

        const ratio = Math.max(0, Math.min(1, y / pageHeight));
        return Math.max(0, Math.min(paragraphCount, Math.round(ratio * (paragraphCount + 1))));
      }

      function compareAssetsByPosition(first, second) {
        return Number(first.box?.y0 || 0) - Number(second.box?.y0 || 0);
      }

      function renderAssetGrid(container, assets) {
        container.replaceChildren(
          ...assets.map((asset) => {
            const link = document.createElement("a");
            link.className = "asset";
            link.href = asset.url;
            link.target = "_blank";
            link.rel = "noreferrer";

            const image = document.createElement("img");
            image.src = asset.url;
            image.alt = asset.label || `page ${asset.page}`;
            image.loading = "lazy";

            const label = document.createElement("span");
            label.className = "asset-label";
            label.textContent = asset.label || `page ${asset.page}`;

            link.append(image, label);
            return link;
          }),
        );
      }

      function setSelectedFile(file) {
        selectedFile = file;

        if (!file) {
          fileName.textContent = "선택된 파일 없음";
          uploadButton.disabled = true;
          setStatus("Ready");
          setFeedback("");
          return;
        }

        if (file.type && file.type !== "application/pdf") {
          selectedFile = null;
          fileName.textContent = file.name;
          uploadButton.disabled = true;
          setStatus("Error");
          setFeedback("PDF 파일만 선택할 수 있습니다.", true);
          return;
        }

        if (!file.name.toLowerCase().endsWith(".pdf")) {
          selectedFile = null;
          fileName.textContent = file.name;
          uploadButton.disabled = true;
          setStatus("Error");
          setFeedback("PDF 파일만 선택할 수 있습니다.", true);
          return;
        }

        fileName.textContent = `${file.name} · ${formatBytes(file.size)}`;
        uploadButton.disabled = false;
        setStatus("Ready");
        setFeedback("");
      }

      function setBusy(isBusy) {
        selectButton.disabled = isBusy;
        uploadButton.disabled = isBusy || !selectedFile;
        urlButton.disabled = true;
        setAnalyzeEnabled(!isBusy && canAnalyzeDocument(currentDocument));
        if (isBusy) {
          setStatus("Working");
        }
      }

      function setFeedback(message, isError = false) {
        feedback.textContent = message;
        feedback.classList.toggle("error", isError);
      }

      function getAnalysisStatusLabel(document) {
        if (document.hasAnalysis || document.analysisStatus === "succeeded") {
          return "번역 있음";
        }
        if (document.analysisStatus === "queued") {
          return `번역 대기 중 ${getDocumentProgressPercent(document)}`;
        }
        if (document.analysisStatus === "running") {
          return `번역 중 ${getDocumentProgressPercent(document)}`;
        }
        if (document.analysisStatus === "failed") {
          return "번역 실패";
        }
        return "번역 전";
      }

      function getDocumentProgressPercent(document) {
        return `${normalizeProgress(document.analysisProgress).percent}%`;
      }

      function normalizeSectionTitle(title) {
        const value = String(title || "").trim();
        return isDocumentAttributionHeading(value) ? "문서" : value;
      }

      function isDocumentAttributionHeading(value) {
        return /^(?:문서\s*(?:\/|및|와|과|·|,|\+|&)\s*)?(?:저자|작성자|필자|글쓴이|프로필|출처)(?:\s*(?:\/|및|와|과|·|,|\+|&)\s*문서)?$/i.test(
          String(value || "").trim(),
        );
      }

      function formatRequestError(error, fallback) {
        const message = String(error?.message || "");
        if (message === "Load failed" || message === "Failed to fetch") {
          return `${fallback}: 요청 연결이 끊겼습니다. 잠시 후 다시 시도하세요.`;
        }
        return message || fallback;
      }

      async function checkSession() {
        const route = parseRouteHash();
        if (route.view === "share" && route.shareToken) {
          await loadSharedDocument(route.shareToken, { preserveHistory: true });
          return;
        }
        if (route.view === "analysis-share" && route.shareToken) {
          await loadSharedAnalysisHtml(route.shareToken, { preserveHistory: true });
          return;
        }
        try {
          const response = await fetch("/api/session");
          if (!response.ok) {
            showLogin();
            return;
          }
          const data = await response.json();
          if (!data.ok) {
            showLogin();
            return;
          }
          showApp(data.user.username, route);
          await loadDocumentList();
          await restoreRouteFromLocation(route);
        } catch {
          showLogin();
        }
      }

      async function loadSharedDocument(token, options = {}) {
        try {
          isShareView = true;
          activePollJobId = "";
          documents = [];
          showSharedApp();
          setFeedback("공유 글 불러오는 중");
          const response = await fetch(`/api/shares/${encodeURIComponent(token)}`);
          const data = await response.json();
          if (!response.ok || !data.ok) {
            throw new Error(data.error || "공유 글을 불러오지 못했습니다.");
          }

          const state = { view: "share", shareToken: token };
          if (options.preserveHistory) {
            history.replaceState(state, "", getRouteHash(state));
          }
          applyRoute(state);
          renderDocument(data.document, { shared: true });
          setFeedback("");
        } catch (error) {
          showLogin();
          loginFeedback.textContent = error.message || "공유 글을 불러오지 못했습니다.";
          loginFeedback.classList.add("error");
        }
      }

      async function loadSharedAnalysisHtml(token, options = {}) {
        try {
          isShareView = true;
          currentAnalysisFile = "";
          showSharedAnalysisApp();
          const response = await fetch(`/api/analysis-html-shares/${encodeURIComponent(token)}?t=${Date.now()}`);
          if (!response.ok) {
            throw new Error("공유 분석 글을 불러오지 못했습니다.");
          }

          const state = { view: "analysis-share", shareToken: token };
          if (options.preserveHistory) {
            history.replaceState(state, "", getRouteHash(state));
          }
          writeAnalysisFrame(await response.text());
        } catch (error) {
          showLogin();
          loginFeedback.textContent = error.message || "공유 분석 글을 불러오지 못했습니다.";
          loginFeedback.classList.add("error");
        }
      }

      async function login(event) {
        event.preventDefault();
        loginButton.disabled = true;
        loginFeedback.textContent = "";
        loginFeedback.classList.remove("error");

        try {
          const response = await fetch("/api/login", {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({
              username: loginUsername.value,
              password: loginPassword.value,
            }),
          });
          const data = await response.json();
          if (!response.ok || !data.ok) {
            throw new Error(data.error || "로그인 실패");
          }

          loginPassword.value = "";
          showApp(data.user.username);
          navigateTo("home", { replace: true });
          await loadDocumentList();
        } catch (error) {
          loginFeedback.textContent = error.message || "로그인 실패";
          loginFeedback.classList.add("error");
        } finally {
          loginButton.disabled = false;
        }
      }

      async function logout() {
        await fetch("/api/logout", { method: "POST" }).catch(() => {});
        activePollJobId = "";
        stopNotesPolling();
        closeAskSheet();
        closeNoteView();
        cancelTitleEdit();
        currentDocument = null;
        selectedFile = null;
        documents = [];
        setAnalyzeEnabled(false);
        documentSection.classList.remove("is-visible");
        showLogin();
      }

      function showApp(username, initialState = { view: "home", documentId: "" }) {
        isShareView = false;
        currentUser.textContent = username;
        activePollJobId = "";
        currentDocument = null;
        setAnalyzeEnabled(false);
        topbar.hidden = false;
        readerToolbar.hidden = false;
        shareButton.hidden = false;
        readerDeleteButton.hidden = false;
        documentSection.classList.remove("is-visible");
        loginView.hidden = true;
        applyRoute(initialState);
        appView.hidden = false;
        setStatus("Ready");
      }

      function showSharedApp() {
        currentView = "share";
        loginView.hidden = true;
        appView.hidden = false;
        homeView.hidden = true;
        analysisView.hidden = true;
        chatView.hidden = true;
        readerView.hidden = false;
        topbar.hidden = true;
        readerToolbar.hidden = true;
        setAnalyzeEnabled(false);
        shareButton.hidden = true;
        readerDeleteButton.hidden = true;
        editTitleButton.hidden = true;
      }

      function showSharedAnalysisApp() {
        currentView = "analysis-share";
        loginView.hidden = true;
        appView.hidden = false;
        homeView.hidden = true;
        analysisView.hidden = false;
        chatView.hidden = true;
        readerView.hidden = true;
        topbar.hidden = true;
        analysisListSection.hidden = true;
        analysisReader.hidden = false;
        analysisBackButton.hidden = true;
        analysisShareButton.hidden = true;
        analysisLlmButton.hidden = true;
        analysisDeleteButton.hidden = true;
      }

      function showLogin() {
        stopNotesPolling();
        stopChatPolling();
        closeChatHistory();
        closeAskSheet();
        closeNoteView();
        closeChatAskSheet();
        appView.hidden = true;
        loginView.hidden = false;
        loginUsername.focus();
      }

      async function ensureAuthorized(response) {
        if (response.status !== 401) {
          return;
        }
        showLogin();
        throw new Error("로그인이 필요합니다.");
      }

      function toggleTheme() {
        const nextTheme = document.body.dataset.theme === "dark" ? "light" : "dark";
        document.body.dataset.theme = nextTheme;
        const isDark = nextTheme === "dark";
        themeButton.setAttribute("aria-label", isDark ? "라이트 모드로 변경" : "다크 모드로 변경");
        themeButton.title = isDark ? "라이트 모드" : "다크 모드";
        syncAnalysisFrameTheme();
      }

      function setStatus(value) {
        if (status) {
          status.textContent = value;
        }
      }

      function navigateTo(view, options = {}) {
        const state = {
          view,
          documentId: options.documentId || currentDocument?.id || "",
          analysisFile: options.analysisFile || "",
          chatId: options.chatId || activeChat?.id || "",
        };
        const nextHash = getRouteHash(state);
        if (options.replace || location.hash === nextHash) {
          history.replaceState(state, "", nextHash);
        } else {
          history.pushState(state, "", nextHash);
        }
        applyRoute(state, false);
      }

      function applyRoute(state) {
        currentView = ["analysis-file", "analysis-share"].includes(state.view)
            ? "analysis"
            : state.view === "list"
              ? "home"
              : state.view || "home";
        document.body.dataset.view = currentView;
        homeView.hidden = currentView !== "home";
        analysisView.hidden = currentView !== "analysis";
        chatView.hidden = currentView !== "chat";
        readerView.hidden = !["reader", "share"].includes(currentView);
        topbar.hidden = ["share", "analysis-share"].includes(state.view);
        readerToolbar.hidden = currentView !== "reader";
        homeNavButton.classList.toggle("is-active", currentView === "home");
        inspectNavButton.classList.toggle("is-active", currentView === "analysis");
        chatNavButton.classList.toggle("is-active", currentView === "chat");
        mountDocumentForView(currentView);
        if (["home", "analysis", "chat"].includes(currentView)) {
          closeAskSheet();
          closeNoteView();
          closeChatAskSheet();
          window.scrollTo({ top: 0, behavior: "auto" });
        }
        if (currentView !== "chat") {
          stopChatPolling();
          closeChatHistory();
        }
        if (state.view === "analysis") {
          analysisFrame.removeAttribute("src");
          currentAnalysisFile = "";
          closeAnalysisChat();
          writeAnalysisFrame("");
          analysisBackButton.hidden = false;
          analysisShareButton.hidden = false;
          analysisLlmButton.hidden = false;
          analysisDeleteButton.hidden = false;
          analysisReader.hidden = true;
          analysisListSection.hidden = false;
        }
      }

      function writeAnalysisFrame(html) {
        const frameDocument = analysisFrame.contentDocument;
        if (!frameDocument) {
          return;
        }
        analysisFrame.style.height = "0px";
        frameDocument.open();
        frameDocument.write(html || "<!doctype html><html><body></body></html>");
        frameDocument.close();
        syncAnalysisFrameTheme();
        bindAnalysisFrameInteractions();
        resizeAnalysisFrame();
      }

      function bindAnalysisFrameInteractions() {
        const frameDocument = analysisFrame.contentDocument;
        if (!frameDocument?.body) {
          return;
        }
        const closeFromFrame = () => {
          if (!analysisChatSheet.hidden) {
            closeAnalysisChat();
          }
        };
        frameDocument.addEventListener("pointerdown", closeFromFrame, true);
        frameDocument.addEventListener("mousedown", closeFromFrame, true);
        frameDocument.addEventListener("touchstart", closeFromFrame, { capture: true, passive: true });
        frameDocument.addEventListener("click", closeFromFrame, true);
      }

      function syncAnalysisFrameTheme() {
        const frameDocument = analysisFrame.contentDocument;
        if (!frameDocument?.head) {
          return;
        }

        const styles = getComputedStyle(document.body);
        const page = styles.getPropertyValue("--page").trim() || "#0f172a";
        const text = styles.getPropertyValue("--text").trim() || "#e5e7eb";
        const colorScheme = document.body.dataset.theme === "light" ? "light" : "dark";
        let style = frameDocument.querySelector("#attn-frame-theme");
        if (!style) {
          style = frameDocument.createElement("style");
          style.id = "attn-frame-theme";
          frameDocument.head.prepend(style);
        }
        style.textContent = `
          :root { color-scheme: ${colorScheme}; background: ${page}; color: ${text}; }
          html { background: ${page}; color: ${text}; overflow: hidden; }
          body { background: ${page}; color: ${text}; overflow: hidden; }
          body:empty { min-height: 100vh; }
        `;
        resizeAnalysisFrame();
      }

      function resizeAnalysisFrame() {
        const frameDocument = analysisFrame.contentDocument;
        if (!frameDocument?.body) {
          return;
        }

        const updateHeight = () => {
          const height = Math.max(
            frameDocument.documentElement?.scrollHeight || 0,
            frameDocument.body.scrollHeight || 0,
            frameDocument.body.offsetHeight || 0,
          );
          analysisFrame.style.height = `${Math.max(1, height)}px`;
        };

        requestAnimationFrame(updateHeight);
        setTimeout(updateHeight, 60);
        setTimeout(updateHeight, 300);
        frameDocument.querySelectorAll("img").forEach((image) => {
          if (!image.complete) {
            image.addEventListener("load", updateHeight, { once: true });
            image.addEventListener("error", updateHeight, { once: true });
          }
        });
      }

      function getRouteHash(state) {
        if (state.view === "share" && state.shareToken) {
          return `#share-${encodeURIComponent(state.shareToken)}`;
        }
        if (state.view === "analysis-share" && state.shareToken) {
          return `#analysis-share-${encodeURIComponent(state.shareToken)}`;
        }
        if (state.view === "reader" && state.documentId) {
          return `#read-${encodeURIComponent(state.documentId)}`;
        }
        if (state.view === "analysis") {
          return "#analysis";
        }
        if (state.view === "analysis-file" && state.analysisFile) {
          return `#analysis-file-${encodeURIComponent(state.analysisFile)}`;
        }
        if (state.view === "chat" && state.chatId) {
          return `#chat-${encodeURIComponent(state.chatId)}`;
        }
        if (state.view === "chat") {
          return "#chat";
        }
        return "#home";
      }

      async function restoreRouteFromLocation(state = parseRouteHash()) {
        history.replaceState(state, "", getRouteHash(state));
        if (state.view === "reader" && state.documentId) {
          await loadDocument(state.documentId, { preserveHistory: true });
          return;
        }
        if (state.view === "analysis-share" && state.shareToken) {
          await loadSharedAnalysisHtml(state.shareToken, { preserveHistory: true });
          return;
        }
        applyRoute(state);
        if (state.view === "analysis") {
          await loadAnalysisHtmlList();
        } else if (state.view === "analysis-file" && state.analysisFile) {
          await openAnalysisHtml(state.analysisFile);
        } else if (state.view === "chat") {
          await loadChats({ chatId: state.chatId || "" });
        }
      }

      function parseRouteHash() {
        const hash = decodeURIComponent(location.hash || "#home");
        if (hash.startsWith("#analysis-share-")) {
          return { view: "analysis-share", shareToken: hash.slice("#analysis-share-".length) };
        }
        if (hash === "#list") {
          return { view: "home", documentId: "" };
        }
        if (hash === "#analysis") {
          return { view: "analysis", documentId: "" };
        }
        if (hash === "#chat") {
          return { view: "chat", documentId: "" };
        }
        if (hash.startsWith("#chat-")) {
          return { view: "chat", chatId: hash.slice("#chat-".length), documentId: "" };
        }
        if (hash.startsWith("#analysis-file-")) {
          return { view: "analysis-file", analysisFile: hash.slice("#analysis-file-".length), documentId: "" };
        }
        if (hash.startsWith("#read-")) {
          return { view: "reader", documentId: hash.slice("#read-".length) };
        }
        if (hash.startsWith("#share-")) {
          return { view: "share", shareToken: hash.slice("#share-".length) };
        }
        return { view: "home", documentId: "" };
      }

      function mountDocumentForView(view) {
        if (!currentDocument || !["reader", "share"].includes(view)) {
          documentSection.classList.remove("is-visible");
          return;
        }
        if (documentSection.parentElement !== readerDocumentMount) {
          readerDocumentMount.append(documentSection);
        }
        documentSection.classList.add("is-visible");
      }

      function setAnalyzeEnabled(isEnabled) {
        const enabled = !isShareView && isEnabled;
        analyzeButton.disabled = !enabled;
        readerAnalyzeButton.disabled = !enabled;
        readerAnalyzeButton.hidden = isShareView;
        readerDeleteButton.hidden = isShareView;
      }

      function canAnalyzeDocument(document) {
        if (!document?.id) {
          return false;
        }
        if (document.analysis || document.hasAnalysis || document.analysisStatus === "succeeded") {
          return false;
        }
        return !["queued", "running"].includes(document.analysisStatus);
      }

      function formatDate(value) {
        return new Date(value).toLocaleString("ko-KR", {
          month: "2-digit",
          day: "2-digit",
          hour: "2-digit",
          minute: "2-digit",
        });
      }

      function formatBytes(bytes) {
        if (!bytes) {
          return "0 B";
        }

        if (bytes < 1024) {
          return `${bytes} B`;
        }

        const units = ["KB", "MB", "GB"];
        let value = bytes / 1024;
        let unitIndex = 0;

        while (value >= 1024 && unitIndex < units.length - 1) {
          value /= 1024;
          unitIndex += 1;
        }

        return `${value.toFixed(value >= 10 ? 1 : 2)} ${units[unitIndex]}`;
      }
    </script>
  </body>
</html>
