<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>attn-viewer</title>
    <style>
      :root {
        color-scheme: dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        --page: #0f172a;
        --surface: #111827;
        --surface-2: #182235;
        --border: #334155;
        --border-soft: #263548;
        --text: #e5e7eb;
        --muted: #94a3b8;
        --muted-2: #cbd5e1;
        --primary: #2dd4bf;
        --primary-strong: #14b8a6;
        --danger: #fca5a5;
        --warning-bg: #451a03;
        --warning-border: #92400e;
        --warning-text: #fed7aa;
        background: var(--page);
        color: var(--text);
      }

      body[data-theme="light"] {
        color-scheme: light;
        --page: #f8fafc;
        --surface: #ffffff;
        --surface-2: #f8fafc;
        --border: #d0d5dd;
        --border-soft: #eaecf0;
        --text: #101828;
        --muted: #667085;
        --muted-2: #475467;
        --primary: #147d64;
        --primary-strong: #0f6b56;
        --danger: #b42318;
        --warning-bg: #fffaeb;
        --warning-border: #fedf89;
        --warning-text: #93370d;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        background: var(--page);
        color: var(--text);
      }

      button,
      input,
      summary {
        font: inherit;
      }

      main {
        width: min(100%, 1280px);
        margin: 0 auto;
        padding: 14px 12px 32px;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 4px 0 12px;
      }

      .primary-nav {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      [hidden] {
        display: none !important;
      }

      .topbar-actions {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      h1,
      h2,
      h3,
      p {
        margin: 0;
      }

      h1 {
        font-size: 20px;
        font-weight: 700;
        letter-spacing: 0;
      }

      .status-pill {
        min-width: 72px;
        border: 1px solid var(--border);
        border-radius: 999px;
        padding: 7px 10px;
        background: var(--surface);
        color: var(--muted-2);
        font-size: 13px;
        text-align: center;
        white-space: nowrap;
      }

      .user-pill {
        border-color: #bbd6cc;
        background: #f2fbf7;
        color: #147d64;
      }

      .surface {
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--surface);
      }

      .login {
        max-width: 390px;
        margin: 14vh auto 0;
        padding: 18px;
      }

      .login-form {
        display: grid;
        gap: 12px;
        margin-top: 18px;
      }

      .field {
        display: grid;
        gap: 6px;
      }

      .field label {
        color: var(--muted-2);
        font-size: 13px;
        font-weight: 700;
      }

      .field input {
        width: 100%;
        min-height: 46px;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 0 12px;
        background: var(--surface-2);
        color: var(--text);
      }

      .field input:focus {
        border-color: var(--primary);
        outline: 3px solid color-mix(in srgb, var(--primary) 28%, transparent);
      }

      .upload {
        margin: 0 auto;
        max-width: 720px;
        padding: 14px;
      }

      .upload.is-dragging {
        border-color: var(--primary);
        background: color-mix(in srgb, var(--primary) 12%, var(--surface));
      }

      .upload-header {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .section-title {
        font-size: 17px;
        line-height: 1.3;
        font-weight: 700;
        letter-spacing: 0;
      }

      .file-name,
      .meta,
      .feedback {
        color: #667085;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.5;
        overflow-wrap: anywhere;
      }

      .actions {
        display: grid;
        grid-template-columns: 1fr;
        gap: 10px;
        margin-top: 14px;
      }

      .button {
        min-height: 48px;
        border: 1px solid var(--primary-strong);
        border-radius: 8px;
        padding: 0 14px;
        background: var(--primary-strong);
        color: #ffffff;
        font-weight: 700;
        cursor: pointer;
      }

      .button.secondary {
        border-color: var(--border);
        background: var(--surface);
        color: var(--text);
      }

      .button.compact {
        min-height: 34px;
        padding: 0 10px;
        font-size: 13px;
      }

      .icon-button {
        display: inline-grid;
        place-items: center;
        width: 38px;
        min-width: 38px;
        height: 38px;
        min-height: 38px;
        padding: 0;
        font-size: 18px;
        line-height: 1;
      }

      .icon-button.is-active {
        border-color: var(--primary);
        color: var(--primary);
      }

      .reader-toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 12px;
      }

      .reader-actions {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .view {
        display: block;
      }

      .view[hidden] {
        display: none !important;
      }

      .button:disabled {
        border-color: var(--border);
        background: var(--surface-2);
        color: var(--muted);
        cursor: not-allowed;
      }

      .feedback {
        min-height: 22px;
        margin-top: 12px;
      }

      .feedback.error {
        color: var(--danger);
      }

      .toast {
        position: fixed;
        left: 50%;
        bottom: 18px;
        z-index: 20;
        transform: translateX(-50%);
        max-width: min(92vw, 420px);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 10px 12px;
        background: var(--surface);
        color: var(--text);
        box-shadow: 0 12px 30px rgb(0 0 0 / 22%);
        font-size: 14px;
        font-weight: 700;
        text-align: center;
      }

      .toast.error {
        border-color: color-mix(in srgb, var(--danger) 55%, var(--border));
        color: var(--danger);
      }

      .document-list {
        margin-top: 12px;
        padding: 12px;
      }

      .list-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 10px;
      }

      .list-items {
        display: grid;
        grid-template-columns: 1fr;
        gap: 10px;
      }

      .doc-item {
        display: grid;
        gap: 8px;
        width: 100%;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--surface-2);
        color: var(--text);
        text-align: left;
        overflow: hidden;
      }

      .doc-item.is-active {
        border-color: var(--primary);
      }

      .doc-item-main {
        display: grid;
        gap: 8px;
        width: 100%;
        border: 0;
        padding: 12px;
        background: transparent;
        color: inherit;
        text-align: left;
        cursor: pointer;
      }

      .doc-item-actions {
        display: flex;
        justify-content: flex-end;
        border-top: 1px solid var(--border-soft);
        padding: 8px 10px;
      }

      .doc-delete {
        min-height: 32px;
        border-color: var(--border);
        color: var(--danger);
        font-size: 13px;
      }

      .doc-item-title {
        font-size: 14px;
        font-weight: 800;
        overflow-wrap: anywhere;
      }

      .doc-item-meta {
        color: var(--muted);
        font-size: 12px;
        line-height: 1.45;
      }

      .doc-item-summary {
        color: var(--muted-2);
        font-size: 13px;
        line-height: 1.55;
        overflow: hidden;
        display: -webkit-box;
        -webkit-box-orient: vertical;
        -webkit-line-clamp: 3;
      }

      .progress-wrap {
        display: grid;
        gap: 7px;
      }

      .progress-wrap[hidden] {
        display: none !important;
      }

      .progress-track {
        width: 100%;
        height: 8px;
        overflow: hidden;
        border-radius: 999px;
        background: var(--border-soft);
      }

      .progress-fill {
        width: var(--progress, 0%);
        height: 100%;
        border-radius: inherit;
        background: var(--primary);
        transition: width 180ms ease;
      }

      .progress-label {
        color: var(--muted);
        font-size: 12px;
        line-height: 1.4;
      }

      .document {
        display: none;
        margin-top: 14px;
      }

      .document.is-visible {
        display: block;
      }

      .document-header {
        display: flex;
        flex-direction: column;
        gap: 6px;
        padding: 12px 2px;
      }

      .document-body {
        display: grid;
        gap: 12px;
      }

      .document-title {
        font-size: 18px;
        font-weight: 700;
        line-height: 1.35;
        letter-spacing: 0;
        overflow-wrap: anywhere;
      }

      .summary-panel {
        display: grid;
        gap: 10px;
        margin-top: 10px;
        padding: 14px;
      }

      .summary-panel .section-title {
        margin-bottom: 0;
      }

      .summary-text {
        color: var(--muted-2);
        font-size: 15px;
        line-height: 1.65;
      }

      .summary-list {
        margin: 0;
        padding-left: 18px;
        color: var(--muted-2);
        font-size: 14px;
        line-height: 1.6;
      }

      .summary-item {
        border-radius: 6px;
        transition: background-color 140ms ease, color 140ms ease;
      }

      .summary-link {
        display: block;
        width: 100%;
        border: 0;
        padding: 3px 4px;
        background: transparent;
        color: inherit;
        font: inherit;
        line-height: inherit;
        text-align: left;
        cursor: pointer;
      }

      .summary-item.is-active {
        background: color-mix(in srgb, var(--primary) 14%, transparent);
        color: var(--text);
      }

      .summary-item.is-active::marker {
        color: var(--primary);
      }

      .summary-actions {
        margin-top: 14px;
      }

      .sample-note {
        color: var(--muted);
        font-size: 13px;
        line-height: 1.45;
      }

      details {
        margin-top: 10px;
      }

      summary {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        min-height: 46px;
        padding: 0 12px;
        border-radius: 8px;
        color: var(--text);
        font-weight: 700;
        cursor: pointer;
        list-style: none;
      }

      summary::-webkit-details-marker {
        display: none;
      }

      summary::after {
        content: "+";
        color: var(--muted);
        font-size: 18px;
        line-height: 1;
      }

      details[open] summary::after {
        content: "-";
      }

      .original-body,
      .snapshot-body {
        border-top: 1px solid var(--border-soft);
        padding: 10px;
      }

      .open-link {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        min-height: 42px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--surface-2);
        color: var(--primary);
        font-size: 14px;
        font-weight: 700;
        text-decoration: none;
      }

      .count {
        color: var(--muted);
        font-size: 13px;
        font-weight: 700;
        white-space: nowrap;
      }

      .asset-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 10px;
      }

      .asset {
        display: block;
        border: 1px solid var(--border-soft);
        border-radius: 8px;
        overflow: hidden;
        background: var(--surface);
        color: var(--muted-2);
        text-decoration: none;
      }

      .asset img {
        display: block;
        width: 100%;
        height: auto;
        background: var(--surface-2);
      }

      .asset-label {
        display: block;
        padding: 8px 10px;
        border-top: 1px solid var(--border-soft);
        color: var(--muted-2);
        font-size: 13px;
        font-weight: 700;
      }

      .document-tools {
        display: grid;
        gap: 12px;
        align-content: start;
      }

      .markdown-section {
        margin-top: 12px;
        overflow: hidden;
      }

      .markdown-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        min-height: 46px;
        padding: 0 12px;
        border-bottom: 1px solid var(--border-soft);
      }

      .reader {
        margin: 0;
        padding: 14px;
        color: var(--text);
        background: var(--surface-2);
      }

      .flow-page {
        margin: 0 0 18px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--surface);
        overflow: hidden;
      }

      .flow-page:last-child {
        margin-bottom: 0;
      }

      .page-marker {
        display: flex;
        align-items: center;
        min-height: 38px;
        padding: 0 12px;
        border-bottom: 1px solid var(--border-soft);
        background: var(--surface-2);
        color: var(--muted-2);
        font-size: 13px;
        font-weight: 700;
        text-transform: uppercase;
      }

      .flow-paragraph {
        margin: 0;
        padding: 14px 12px 0;
        white-space: pre-wrap;
        overflow-wrap: anywhere;
        font-size: 15px;
        line-height: 1.72;
      }

      .paragraph-block {
        padding: 14px 12px 2px;
        border-left: 3px solid transparent;
        transition: background-color 140ms ease, border-color 140ms ease;
        scroll-margin-top: 72px;
      }

      .paragraph-block.is-active {
        border-left-color: var(--primary);
        background: color-mix(in srgb, var(--primary) 7%, transparent);
      }

      .paragraph-note {
        margin-bottom: 12px;
        border-left: 3px solid var(--primary);
        padding: 10px 12px;
        background: color-mix(in srgb, var(--primary) 12%, var(--surface));
      }

      .note-label {
        display: block;
        margin-bottom: 4px;
        color: var(--primary);
        font-size: 12px;
        font-weight: 800;
      }

      .paragraph-note p,
      .chart-note p {
        margin: 0;
        color: var(--muted-2);
        font-size: 14px;
        line-height: 1.55;
      }

      .note-status {
        display: none;
        margin: 4px 0 0;
        border: 1px solid color-mix(in srgb, var(--primary) 45%, var(--border));
        border-radius: 8px;
        padding: 9px 10px;
        background: color-mix(in srgb, var(--primary) 10%, var(--surface));
        color: var(--muted-2);
        font-size: 13px;
        font-weight: 700;
        line-height: 1.45;
      }

      .note-status.is-visible {
        display: block;
      }

      .note-sheet {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 40;
        display: grid;
        gap: 10px;
        max-height: 78vh;
        border: 1px solid var(--border);
        border-radius: 8px 8px 0 0;
        padding: 14px;
        background: var(--surface);
        box-shadow: 0 -16px 36px rgb(0 0 0 / 28%);
      }

      #noteViewSheet .note-sheet-head {
        order: 1;
      }

      #noteViewSelection {
        order: 2;
        grid-column: auto;
        grid-row: auto;
      }

      #noteViewQuestion {
        order: 3;
      }

      #noteViewThread {
        order: 4;
      }

      #noteViewSheet .note-input-wrap {
        order: 5;
      }

      .note-sheet-head {
        display: grid;
        grid-template-columns: auto 1fr auto;
        align-items: center;
        gap: 10px;
        min-height: 34px;
      }

      .note-sheet-actions {
        grid-column: 3;
        display: grid;
        grid-auto-flow: column;
        grid-auto-columns: 34px;
        align-items: center;
        justify-content: end;
        gap: 6px;
      }

      .note-sheet-actions .icon-button {
        display: grid;
        place-items: center;
        width: 34px;
        min-width: 34px;
        height: 34px;
        min-height: 34px;
        border-radius: 7px;
        padding: 0;
        font-size: 18px;
        line-height: 1;
      }

      .toolbar-icon {
        display: block;
        width: 17px;
        height: 17px;
        stroke: currentColor;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
        fill: none;
      }

      .note-input-wrap {
        display: grid;
        grid-template-columns: minmax(0, 9fr) minmax(46px, 1fr);
        grid-template-rows: auto minmax(92px, 1fr);
        gap: 8px;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 8px;
        background: var(--surface-2);
      }

      .note-input-wrap.reply {
        grid-template-rows: minmax(68px, 1fr);
      }

      .note-input-wrap.reply .note-question {
        grid-row: 1;
      }

      .note-input-wrap.reply .note-send {
        grid-row: 1;
      }

      .note-input-main {
        display: contents;
        min-width: 0;
      }

      .note-selected {
        min-width: 0;
        margin: 0;
        color: var(--muted-2);
        font-size: 14px;
        line-height: 1.45;
        overflow-wrap: anywhere;
      }

      .note-selected.tag {
        width: fit-content;
        max-width: 100%;
        border: 1px solid color-mix(in srgb, var(--primary) 45%, var(--border));
        border-radius: 5px;
        padding: 5px 9px;
        background: color-mix(in srgb, var(--primary) 12%, var(--surface));
        color: var(--text);
        font-size: 13px;
        font-weight: 800;
      }

      .note-input-wrap .note-selected.tag {
        grid-column: 1;
        grid-row: 1;
      }

      .note-question {
        grid-column: 1;
        grid-row: 2;
        width: 100%;
        min-height: 100%;
        resize: vertical;
        border: 0;
        padding: 2px 4px;
        background: transparent;
        color: var(--text);
        font: inherit;
        line-height: 1.5;
      }

      .note-send {
        grid-column: 2;
        grid-row: 1 / span 2;
        align-self: stretch;
        min-height: 100%;
        border-radius: 8px;
        font-size: 20px;
        line-height: 1;
      }

      .note-mode {
        grid-column: 1;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 6px;
        width: 128px;
      }

      .note-mode input {
        position: absolute;
        opacity: 0;
        pointer-events: none;
      }

      .note-mode span {
        display: grid;
        place-items: center;
        min-height: 34px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--surface-2);
        color: var(--muted-2);
        font-size: 14px;
        font-weight: 800;
      }

      .note-mode input:checked + span {
        border-color: var(--primary);
        background: color-mix(in srgb, var(--primary) 16%, var(--surface-2));
        color: var(--text);
      }

      .note-answer {
        max-height: 45vh;
        overflow-y: auto;
        color: var(--muted-2);
        font-size: 14px;
        line-height: 1.6;
        white-space: pre-wrap;
      }

      .note-thread {
        display: grid;
        gap: 8px;
        max-height: 42vh;
        overflow-y: auto;
      }

      .note-message {
        border: 1px solid var(--border-soft);
        border-radius: 8px;
        padding: 9px 10px;
        background: var(--surface-2);
        color: var(--muted-2);
        font-size: 14px;
        line-height: 1.55;
        white-space: pre-wrap;
      }

      .note-message.user {
        border-color: color-mix(in srgb, var(--primary) 38%, var(--border));
        color: var(--text);
      }

      .note-delete {
        color: var(--danger);
      }

      .semantic-title {
        margin: 0 0 10px;
        color: var(--text);
        font-size: 15px;
        font-weight: 800;
        line-height: 1.45;
      }

      .sentence-pair {
        position: relative;
        padding: 10px 0 12px;
        border-bottom: 1px solid var(--border-soft);
        overflow: hidden;
      }

      .sentence-pair.has-note::before {
        content: "";
        position: absolute;
        top: 10px;
        right: 2px;
        z-index: 2;
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--primary);
      }

      .sentence-pair.has-note.is-pending-note::before {
        width: 7px;
        height: 7px;
        background: #facc15;
        box-shadow: 0 0 0 2px color-mix(in srgb, #facc15 22%, transparent);
      }

      .sentence-pair:last-child {
        border-bottom: 0;
      }

      .source-sentence {
        position: relative;
        z-index: 1;
        margin: 0;
        color: var(--text);
        font-size: 15px;
        line-height: 1.7;
        overflow-wrap: anywhere;
      }

      .translated-sentence {
        position: relative;
        z-index: 1;
        margin: 5px 0 0;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.65;
        overflow-wrap: anywhere;
      }

      .flow-asset {
        margin: 16px 12px 2px;
        border: 1px solid var(--border-soft);
        border-radius: 8px;
        overflow: hidden;
        background: var(--surface);
      }

      .flow-asset a {
        display: block;
      }

      .flow-asset img {
        display: block;
        width: 100%;
        height: auto;
        background: var(--surface-2);
      }

      .flow-asset figcaption {
        padding: 8px 10px;
        border-top: 1px solid var(--border-soft);
        color: var(--muted-2);
        font-size: 13px;
        font-weight: 700;
      }

      .chart-note {
        padding: 10px 12px 12px;
        border-top: 1px solid var(--border-soft);
        background: var(--surface-2);
      }

      .warnings {
        display: none;
        margin-top: 10px;
        border: 1px solid var(--warning-border);
        border-radius: 8px;
        padding: 10px 12px;
        background: var(--warning-bg);
        color: var(--warning-text);
        font-size: 13px;
        line-height: 1.45;
        white-space: pre-wrap;
        overflow-wrap: anywhere;
      }

      .warnings.is-visible {
        display: block;
      }

      @media (min-width: 620px) {
        main {
          padding: 22px 20px 40px;
        }

        .upload {
          padding: 16px;
        }

        .actions {
          grid-template-columns: repeat(3, minmax(0, 1fr));
          max-width: 680px;
        }

        .asset-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .list-items {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 720px) {
        .source-sentence,
        .translated-sentence {
          touch-action: pan-y;
        }
      }

      @media (min-width: 920px) {
        .topbar {
          padding-top: 8px;
          padding-bottom: 16px;
        }

        .document-list {
          padding: 16px;
        }

        .list-items {
          grid-template-columns: repeat(3, minmax(0, 1fr));
          align-items: stretch;
        }

        .doc-item {
          min-height: 190px;
        }

        .doc-item-main {
          grid-template-rows: auto auto 1fr auto;
        }

        .asset-grid {
          grid-template-columns: repeat(3, minmax(0, 1fr));
        }
      }

      @media (min-width: 1100px) {
        .reader-toolbar {
          position: sticky;
          top: 0;
          z-index: 3;
          margin: 0 -2px 14px;
          padding: 8px 0;
          background: var(--page);
        }

        .document-header {
          padding-top: 2px;
        }

        .document-body {
          grid-template-columns: minmax(360px, 400px) minmax(0, 1fr);
          align-items: start;
        }

        .summary-panel {
          margin-top: 0;
        }

        .document-tools {
          position: sticky;
          top: 58px;
          grid-template-rows: auto auto minmax(220px, 1fr);
          max-height: calc(100vh - 72px);
          overflow-y: auto;
          overscroll-behavior: contain;
          padding-right: 2px;
          scrollbar-gutter: stable;
        }

        #pageDetails[open] {
          min-height: 0;
        }

        #pageDetails[open] .snapshot-body {
          max-height: min(42vh, 460px);
          overflow-y: auto;
          overscroll-behavior: contain;
          scrollbar-gutter: stable;
        }

        .summary-panel {
          min-height: 0;
          max-height: 100%;
          overflow-y: auto;
          scrollbar-gutter: stable;
        }

        .markdown-section {
          margin-top: 0;
        }

        .note-sheet {
          left: auto;
          right: 18px;
          bottom: 18px;
          width: min(420px, calc(100vw - 36px));
          border-radius: 8px;
        }

      }
    </style>
  </head>
  <body data-theme="dark">
    <main>
      <section class="surface login" id="loginView" hidden>

      <div id="appView" hidden>
        <div class="topbar">

        <section class="view" id="homeView">

          <div class="document-body">

              <path d="M3 6h18" />

              <path d="M14 11v6" />

        <button class="button note-send" type="button" id="noteReplySubmit" aria-label="후속 질문 보내기" title="후속 질문 보내기">↑</button>
